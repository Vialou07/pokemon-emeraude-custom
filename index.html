<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pokemon Emeraude Custom</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
        h1 {
            font-size: 1.2rem;
            margin: 8px 0;
            text-align: center;
            color: #e94560;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: calc(100vh - 40px);
            height: calc(100dvh - 40px);
            max-width: 800px;
            max-height: 600px;
        }
        @media (max-width: 768px) {
            #game-container {
                width: 100vw;
                height: 100vh;
                height: 100dvh;
                max-width: none;
                max-height: none;
            }
            h1 {
                display: none;
            }
        }
        /* Save notification toast */
        #save-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 200, 83, 0.9);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            z-index: 10000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #save-toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <h1>Pokemon Emeraude Custom</h1>
    <div id="game-container"></div>
    <div id="save-toast">Sauvegarde OK</div>

    <script>
        // Request persistent storage (prevents browser from clearing IndexedDB)
        if (navigator.storage && navigator.storage.persist) {
            navigator.storage.persist().then(granted => {
                console.log('[Save] Persistent storage:', granted ? 'granted' : 'denied');
            });
        }

        // EmulatorJS configuration
        EJS_player = '#game-container';
        EJS_core = 'gba';
        EJS_gameUrl = 'rom/pokemon.gba';

        // CRITICAL: Fixed game name ensures saves persist across ROM updates
        EJS_gameName = 'pokeemerald_custom';

        EJS_color = '#e94560';
        EJS_startOnLoaded = true;
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';

        // Flush core SRAM to Emscripten MEMFS every 5 seconds
        EJS_fixedSaveInterval = 5000;

        EJS_Buttons = {
            playBtnColor: '#e94560',
            playBtnHoverColor: '#ff6b81',
        };

        EJS_defaultOptions = {
            'save-state-slot': 1,
            'save-state-location': 'browser',
            'rewind_enable': 'false',
            'rewind_buffer_size': '0',
        };

        // ============================================================
        // SAVE SYSTEM - localStorage backup (synchrone = fiable)
        // ============================================================
        // mGBA writes saves to /data/saves/mGBA/pokemon.srm (128KB)
        // IndexedDB sync is async and unreliable on page close.
        // Fix: also backup to localStorage (sync = guaranteed).
        // On load: restore from localStorage -> FS before game starts.
        // ============================================================

        var SAVE_PATH = '/data/saves/mGBA/pokemon.srm';
        var LS_KEY = 'pokeemerald_save';
        var _fsRef = null;
        var _saveActive = false;

        function findFS() {
            if (_fsRef) return _fsRef;
            try {
                var fs = window.EJS_emulator.gameManager.Module.FS;
                if (fs && typeof fs.readFile === 'function') { _fsRef = fs; return fs; }
            } catch(e) {}
            return null;
        }

        function showToast(msg, color) {
            var t = document.getElementById('save-toast');
            t.textContent = msg;
            t.style.background = color || 'rgba(0, 200, 83, 0.9)';
            t.classList.add('show');
            setTimeout(function() { t.classList.remove('show'); }, 2000);
        }

        // Read save from FS and backup to localStorage (SYNCHRONOUS)
        function backupSaveToLS(reason) {
            var fs = findFS();
            if (!fs) return;
            try {
                var data = fs.readFile(SAVE_PATH);
                if (data && data.length > 0) {
                    // Check if non-empty (not all 0x00 or 0xFF)
                    var hasData = false;
                    for (var i = 0; i < Math.min(512, data.length); i++) {
                        if (data[i] !== 0 && data[i] !== 0xFF) { hasData = true; break; }
                    }
                    if (hasData) {
                        // Convert to base64 for localStorage
                        var binary = '';
                        for (var i = 0; i < data.length; i++) {
                            binary += String.fromCharCode(data[i]);
                        }
                        localStorage.setItem(LS_KEY, btoa(binary));
                        console.log('[Save] Backup to localStorage OK (' + reason + ', ' + data.length + 'B)');
                        if (reason === 'periodic') {
                            if (!_saveActive) {
                                _saveActive = true;
                                showToast('Sauvegardes actives', 'rgba(0, 150, 255, 0.9)');
                            }
                        }
                        return true;
                    }
                }
            } catch(e) {
                // File doesn't exist yet - normal before first save
            }
            return false;
        }

        // Restore save from localStorage to FS
        function restoreSaveFromLS() {
            var fs = findFS();
            if (!fs) return false;
            var b64 = localStorage.getItem(LS_KEY);
            if (!b64) {
                console.log('[Save] No localStorage backup found');
                return false;
            }
            try {
                var binary = atob(b64);
                var data = new Uint8Array(binary.length);
                for (var i = 0; i < binary.length; i++) {
                    data[i] = binary.charCodeAt(i);
                }
                // Ensure directory exists
                try { fs.mkdir('/data/saves/mGBA'); } catch(e) {}
                fs.writeFile(SAVE_PATH, data);
                console.log('[Save] Restored from localStorage (' + data.length + ' bytes)');
                showToast('Sauvegarde restauree !', 'rgba(0, 150, 255, 0.9)');
                return true;
            } catch(e) {
                console.warn('[Save] Restore failed:', e);
                return false;
            }
        }

        // Wait for FS to be ready, restore save, start periodic backup
        var _poll = setInterval(function() {
            var fs = findFS();
            if (fs) {
                clearInterval(_poll);
                console.log('[Save] FS ready');

                // Restore save from localStorage (before game loads it)
                restoreSaveFromLS();

                // Also try FS.syncfs to load from IndexedDB
                try { fs.syncfs(true, function() {}); } catch(e) {}

                // Start periodic backup every 4 seconds
                setInterval(function() { backupSaveToLS('periodic'); }, 4000);
                console.log('[Save] Periodic backup active (every 4s)');
            }
        }, 1000);

        // On page hide/close: force one last backup (localStorage = sync = reliable)
        function emergencySave() {
            backupSaveToLS('emergency');
        }
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'hidden') emergencySave();
        });
        window.addEventListener('pagehide', emergencySave);
        window.addEventListener('beforeunload', emergencySave);
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
