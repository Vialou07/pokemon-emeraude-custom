<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pokemon Emeraude Custom</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
        h1 {
            font-size: 1.2rem;
            margin: 8px 0;
            text-align: center;
            color: #e94560;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: calc(100vh - 40px);
            height: calc(100dvh - 40px);
            max-width: 800px;
            max-height: 600px;
        }
        @media (max-width: 768px) {
            #game-container {
                width: 100vw;
                height: 100vh;
                height: 100dvh;
                max-width: none;
                max-height: none;
            }
            h1 {
                display: none;
            }
        }
        /* Save notification toast */
        #save-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 200, 83, 0.9);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            z-index: 10000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #save-toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <h1>Pokemon Emeraude Custom</h1>
    <div id="game-container"></div>
    <div id="save-toast">Sauvegarde OK</div>

    <script>
        // Request persistent storage (prevents browser from clearing IndexedDB)
        if (navigator.storage && navigator.storage.persist) {
            navigator.storage.persist().then(granted => {
                console.log('[Save] Persistent storage:', granted ? 'granted' : 'denied');
            });
        }

        // EmulatorJS configuration
        EJS_player = '#game-container';
        EJS_core = 'gba';
        EJS_gameUrl = 'rom/pokemon.gba';

        // CRITICAL: Fixed game name ensures saves persist across ROM updates
        EJS_gameName = 'pokeemerald_custom';

        EJS_color = '#e94560';
        EJS_startOnLoaded = true;
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';

        // Flush core SRAM to Emscripten MEMFS every 5 seconds
        EJS_fixedSaveInterval = 5000;

        EJS_Buttons = {
            playBtnColor: '#e94560',
            playBtnHoverColor: '#ff6b81',
        };

        EJS_defaultOptions = {
            'save-state-slot': 1,
            'save-state-location': 'browser',
            'rewind_enable': 'false',
            'rewind_buffer_size': '0',
        };

        // Show notification when save is detected
        EJS_onSaveUpdate = function(e) {
            const toast = document.getElementById('save-toast');
            toast.textContent = 'Sauvegarde OK';
            toast.style.background = 'rgba(0, 200, 83, 0.9)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
            console.log('[Save] Save update detected (hash: ' + e.hash + ')');
        };

        // ============================================================
        // SAVE PERSISTENCE FIX
        // ============================================================
        // EmulatorJS stores saves in Emscripten's MEMFS but only
        // flushes to IndexedDB on beforeunload (unreliable).
        // We force FS.syncfs() periodically + on page hide.
        //
        // Access path: EJS_emulator -> gameManager -> Module -> FS
        // ============================================================

        var _syncing = false;
        var _fsRef = null;    // Cached FS reference
        var _syncCount = 0;
        var _syncOK = false;

        function findFS() {
            if (_fsRef) return _fsRef;
            // Try all known paths to find the Emscripten FS object
            var paths = [
                function() { return window.EJS_emulator.gameManager.Module.FS; },
                function() { return window.EJS_emulator.gameManager.FS; },
                function() { return window.EJS_emulator.Module.FS; },
                function() { return window.Module.FS; },
                function() { return window.FS; },
            ];
            for (var i = 0; i < paths.length; i++) {
                try {
                    var fs = paths[i]();
                    if (fs && typeof fs.syncfs === 'function') {
                        console.log('[Save] Found FS via path ' + i);
                        _fsRef = fs;
                        return fs;
                    }
                } catch(e) { /* try next */ }
            }
            return null;
        }

        function doSync(reason) {
            if (_syncing) return;
            var fs = findFS();
            if (!fs) {
                // Not ready yet - show in toast for debugging
                if (_syncCount === 0) {
                    console.log('[Save] FS not found yet (' + reason + ')');
                }
                return;
            }
            _syncing = true;
            _syncCount++;
            try {
                fs.syncfs(false, function(err) {
                    _syncing = false;
                    if (err) {
                        console.warn('[Save] syncfs error:', err);
                    } else {
                        if (!_syncOK) {
                            _syncOK = true;
                            console.log('[Save] First successful sync! Saves will persist.');
                            var t = document.getElementById('save-toast');
                            t.textContent = 'Sauvegardes actives';
                            t.style.background = 'rgba(0, 150, 255, 0.9)';
                            t.classList.add('show');
                            setTimeout(function() { t.classList.remove('show'); }, 3000);
                        }
                    }
                });
            } catch(e) {
                _syncing = false;
                console.warn('[Save] syncfs exception:', e);
            }
        }

        // Recursively list files in a directory
        function listDir(fs, path, label) {
            try {
                var files = fs.readdir(path);
                files.filter(function(f) { return f !== '.' && f !== '..'; }).forEach(function(f) {
                    var full = path + '/' + f;
                    try {
                        var stat = fs.stat(full);
                        var isDir = fs.isDir(stat.mode);
                        console.log('[Save] ' + label + ' ' + full + (isDir ? '/ (dir)' : ' (' + stat.size + ' bytes)'));
                        if (isDir) listDir(fs, full, label);
                    } catch(e) {
                        console.log('[Save] ' + label + ' ' + full + ' (stat error)');
                    }
                });
            } catch(e) { /* ignore */ }
        }

        // Get save data directly from RetroArch core and write to FS + IndexedDB
        function forceSaveFlush() {
            var fs = findFS();
            if (!fs) return false;
            try {
                var gm = window.EJS_emulator.gameManager;
                var M = gm.Module;

                // Try RetroArch API: retro_get_memory_data(0) / retro_get_memory_size(0)
                // 0 = RETRO_MEMORY_SAVE_RAM
                var getSize = null, getData = null;
                if (typeof M._retro_get_memory_size === 'function') {
                    getSize = function(t) { return M._retro_get_memory_size(t); };
                    getData = function(t) { return M._retro_get_memory_data(t); };
                } else if (typeof M.cwrap === 'function') {
                    try {
                        getSize = M.cwrap('retro_get_memory_size', 'number', ['number']);
                        getData = M.cwrap('retro_get_memory_data', 'number', ['number']);
                    } catch(e) { /* not available */ }
                }

                if (getSize && getData) {
                    var size = getSize(0); // RETRO_MEMORY_SAVE_RAM
                    console.log('[Save] Core SRAM size: ' + size + ' bytes');

                    if (size > 0) {
                        var ptr = getData(0);
                        var saveData = new Uint8Array(M.HEAPU8.buffer, ptr, size);
                        // Check if save is non-empty (not all zeros/0xFF)
                        var nonZero = 0;
                        for (var i = 0; i < Math.min(256, size); i++) {
                            if (saveData[i] !== 0 && saveData[i] !== 0xFF) nonZero++;
                        }
                        console.log('[Save] SRAM first 256 bytes: ' + nonZero + ' non-zero/FF values');

                        if (nonZero > 0) {
                            // Write save data directly to filesystem
                            var savePath = '/data/saves/pokeemerald_custom.srm';
                            var copy = new Uint8Array(size);
                            copy.set(saveData);
                            fs.writeFile(savePath, copy);
                            console.log('[Save] Wrote ' + size + ' bytes to ' + savePath);

                            // Now sync to IndexedDB
                            doSync('forced-flush');

                            var t = document.getElementById('save-toast');
                            t.textContent = 'Sauvegarde OK (' + (size/1024) + ' KB)';
                            t.style.background = 'rgba(0, 200, 83, 0.9)';
                            t.classList.add('show');
                            setTimeout(function() { t.classList.remove('show'); }, 2000);
                            return true;
                        } else {
                            console.log('[Save] SRAM appears empty (no game save yet)');
                        }
                    } else {
                        console.log('[Save] Core reports 0 SRAM size');
                    }
                } else {
                    console.log('[Save] retro_get_memory_data not available');
                }
            } catch(e) {
                console.warn('[Save] forceSaveFlush error:', e);
            }
            return false;
        }

        // Poll until FS is found, then start periodic save + sync
        var _pollInterval = setInterval(function() {
            var fs = findFS();
            if (fs) {
                clearInterval(_pollInterval);
                console.log('[Save] FS found! Starting save system');
                listDir(fs, '/data/saves', 'INIT');
                doSync('initial');

                // Every 8 seconds: flush core SRAM to FS, then sync FS to IndexedDB
                setInterval(function() {
                    forceSaveFlush();
                }, 8000);

                console.log('[Save] Periodic save+sync active (every 8s)');
            }
        }, 2000);

        // Sync on tab switch (reliable on mobile)
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'hidden') doSync('hidden');
        });
        // Sync on page close
        window.addEventListener('pagehide', function() { doSync('pagehide'); });
        window.addEventListener('beforeunload', function() { doSync('beforeunload'); });
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
