<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pokemon Emeraude Custom</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
        h1 {
            font-size: 1.2rem;
            margin: 8px 0;
            text-align: center;
            color: #e94560;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: calc(100vh - 40px);
            height: calc(100dvh - 40px);
            max-width: 800px;
            max-height: 600px;
        }
        @media (max-width: 768px) {
            #game-container {
                width: 100vw;
                height: 100vh;
                height: 100dvh;
                max-width: none;
                max-height: none;
            }
            h1 {
                display: none;
            }
        }
        /* Save notification toast */
        #save-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 200, 83, 0.9);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            z-index: 10000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #save-toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <h1>Pokemon Emeraude Custom</h1>
    <div id="game-container"></div>
    <div id="save-toast">Sauvegarde OK</div>

    <script>
        // Request persistent storage (prevents browser from clearing IndexedDB)
        if (navigator.storage && navigator.storage.persist) {
            navigator.storage.persist().then(granted => {
                console.log('[Save] Persistent storage:', granted ? 'granted' : 'denied');
            });
        }

        // EmulatorJS configuration
        EJS_player = '#game-container';
        EJS_core = 'gba';
        EJS_gameUrl = 'rom/pokemon.gba';

        EJS_gameName = 'pokeemerald_custom';
        EJS_color = '#e94560';
        EJS_startOnLoaded = true;
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        EJS_fixedSaveInterval = 5000;

        // ============================================================
        // SAVE SYSTEM
        // ============================================================
        // Restore save from localStorage BEFORE EmulatorJS loads.
        // EJS_gameSaveUrl with a Blob URL feeds the save to mGBA at
        // init time, so "Continue" appears immediately.
        // Periodic backup reads /data/saves/mGBA/pokemon.srm -> localStorage.
        // ============================================================

        var LS_KEY = 'pokeemerald_save';
        var SAVE_PATH = '/data/saves/mGBA/pokemon.srm';

        // RESTORE: Create Blob URL from localStorage BEFORE loader.js runs
        (function() {
            var b64 = localStorage.getItem(LS_KEY);
            if (b64) {
                try {
                    var binary = atob(b64);
                    var bytes = new Uint8Array(binary.length);
                    for (var i = 0; i < binary.length; i++) {
                        bytes[i] = binary.charCodeAt(i);
                    }
                    var blob = new Blob([bytes], { type: 'application/octet-stream' });
                    EJS_gameSaveUrl = URL.createObjectURL(blob);
                    console.log('[Save] Restored save from localStorage (' + bytes.length + ' bytes) -> EJS_gameSaveUrl');
                } catch(e) {
                    console.warn('[Save] Restore failed:', e);
                }
            } else {
                console.log('[Save] No previous save found');
            }
        })();

        EJS_defaultOptions = {
            'save-state-slot': 1,
            'save-state-location': 'browser',
        };

        // BACKUP: Read .srm from FS and save to localStorage periodically
        var _fsRef = null;
        var _saveActive = false;

        function findFS() {
            if (_fsRef) return _fsRef;
            try {
                var fs = window.EJS_emulator.gameManager.Module.FS;
                if (fs && typeof fs.readFile === 'function') { _fsRef = fs; return fs; }
            } catch(e) {}
            return null;
        }

        function showToast(msg, color) {
            var t = document.getElementById('save-toast');
            t.textContent = msg;
            t.style.background = color || 'rgba(0, 200, 83, 0.9)';
            t.classList.add('show');
            setTimeout(function() { t.classList.remove('show'); }, 2000);
        }

        function backupSave(reason) {
            var fs = findFS();
            if (!fs) return false;
            try {
                var data = fs.readFile(SAVE_PATH);
                if (!data || data.length === 0) return false;
                // Check non-empty
                var hasData = false;
                for (var i = 0; i < Math.min(512, data.length); i++) {
                    if (data[i] !== 0 && data[i] !== 0xFF) { hasData = true; break; }
                }
                if (!hasData) return false;
                // Store as base64
                var bin = '';
                for (var i = 0; i < data.length; i++) bin += String.fromCharCode(data[i]);
                localStorage.setItem(LS_KEY, btoa(bin));
                if (!_saveActive) {
                    _saveActive = true;
                    showToast('Sauvegardes actives', 'rgba(0, 150, 255, 0.9)');
                    console.log('[Save] First backup OK (' + data.length + 'B)');
                }
                return true;
            } catch(e) { return false; }
        }

        // Poll for FS, then backup every 4s
        var _poll = setInterval(function() {
            if (findFS()) {
                clearInterval(_poll);
                setInterval(function() { backupSave('periodic'); }, 4000);
                console.log('[Save] Backup system active (every 4s)');
            }
        }, 2000);

        // Emergency save on page hide/close (localStorage = synchronous = reliable)
        function emergencySave() { backupSave('emergency'); }
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'hidden') emergencySave();
        });
        window.addEventListener('pagehide', emergencySave);
        window.addEventListener('beforeunload', emergencySave);
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
