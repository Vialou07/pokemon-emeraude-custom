<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pokemon Emeraude Custom</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        body {
            background: #1a1a2e;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 100vh; min-height: 100dvh;
            font-family: 'Segoe UI', sans-serif; color: white;
            overflow: hidden; -webkit-user-select: none; user-select: none;
        }
        h1 { font-size: 1.2rem; margin: 8px 0; text-align: center; color: #e94560; }
        #game-container {
            position: relative; width: 100vw;
            height: calc(100vh - 40px); height: calc(100dvh - 40px);
            max-width: 800px; max-height: 600px;
        }
        @media (max-width: 768px) {
            #game-container { width: 100vw; height: 100vh; height: 100dvh; max-width: none; max-height: none; }
            h1 { display: none; }
        }

        /* Top bar */
        #top-bar {
            position: fixed; top: 6px; right: 6px; z-index: 10001;
            display: flex; gap: 5px; align-items: center;
        }
        #top-bar .user-info {
            color: #0f8; font-size: 0.75rem; padding: 8px 10px;
            background: rgba(0,180,80,0.15); border-radius: 8px;
        }
        #top-bar button {
            background: rgba(100,100,100,0.6); color: white; border: none;
            border-radius: 8px; padding: 8px 10px; font-size: 0.7rem; font-weight: bold;
            cursor: pointer; touch-action: manipulation;
        }
        #top-bar button:active { opacity: 0.6; }
        #arena-btn { background: rgba(233,69,96,0.6) !important; }

        /* Arena modal */
        #arena-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 60000;
            align-items: center; justify-content: center;
        }
        #arena-overlay.open { display: flex; }
        .arena-card {
            background: #16213e; border: 2px solid #e94560; border-radius: 16px;
            padding: 24px; width: 92%; max-width: 400px; max-height: 85vh;
            overflow-y: auto; text-align: center;
        }
        .arena-card h3 { color: #e94560; margin-bottom: 14px; font-size: 1.15rem; }
        .arena-card select {
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #555;
            background: #1a1a2e; color: white; font-size: 0.95rem; margin-bottom: 14px;
        }
        .arena-team-preview { text-align: left; margin-bottom: 14px; }
        .arena-pokemon {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 10px; background: rgba(255,255,255,0.05); border-radius: 8px;
            margin-bottom: 4px; font-size: 0.85rem;
        }
        .arena-pokemon .poke-name { font-weight: bold; color: #0f8; }
        .arena-pokemon .poke-level { color: #aaa; }
        .arena-pokemon .poke-item { color: #f5a623; font-size: 0.75rem; }
        .arena-btns { display: flex; gap: 8px; margin-top: 10px; }
        .arena-btns button {
            flex: 1; padding: 10px; border: none; border-radius: 8px;
            font-size: 0.9rem; font-weight: bold; cursor: pointer;
        }
        .arena-btns .btn-submit { background: #e94560; color: white; }
        .arena-btns .btn-submit:disabled { opacity: 0.4; }
        .arena-btns .btn-close { background: #333; color: #aaa; }
        #arena-status { font-size: 0.8rem; margin-top: 8px; min-height: 1.2em; }

        /* Toast */
        #toast {
            position: fixed; top: 50px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 200, 83, 0.9); color: white;
            padding: 12px 28px; border-radius: 20px;
            font-size: 1rem; font-weight: bold;
            z-index: 99999; pointer-events: none;
            opacity: 0; transition: opacity 0.3s ease;
            text-align: center; max-width: 90%;
        }
        #toast.show { opacity: 1; }

        /* Auth overlay */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a2e; z-index: 50000;
            display: flex; align-items: center; justify-content: center;
        }
        #auth-overlay.hidden { display: none; }
        .auth-card {
            background: #16213e; border: 2px solid #e94560; border-radius: 16px;
            padding: 30px; width: 90%; max-width: 360px; text-align: center;
        }
        .auth-card h2 { color: #e94560; margin-bottom: 6px; font-size: 1.3rem; }
        .auth-card .subtitle { color: #888; font-size: 0.8rem; margin-bottom: 20px; }
        .auth-card input {
            width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px;
            border: 1px solid #555; background: #1a1a2e; color: white;
            font-size: 1rem; outline: none;
        }
        .auth-card input:focus { border-color: #e94560; }
        .auth-card .auth-btn {
            width: 100%; padding: 12px; background: #e94560; color: white;
            border: none; border-radius: 8px; font-size: 1rem; font-weight: bold;
            cursor: pointer; margin-bottom: 10px;
        }
        .auth-card .auth-btn:disabled { opacity: 0.5; }
        .auth-card .auth-switch { color: #888; font-size: 0.85rem; cursor: pointer; }
        .auth-card .auth-switch span { color: #e94560; text-decoration: underline; }
        .auth-card .auth-error {
            color: #ff5555; font-size: 0.8rem; margin-bottom: 10px; min-height: 1.2em;
        }
    </style>
</head>
<body>
    <!-- Auth overlay -->
    <div id="auth-overlay">
        <div class="auth-card">
            <h2>Pokemon Emeraude</h2>
            <div class="subtitle">Connecte-toi pour jouer</div>
            <div id="auth-error" class="auth-error"></div>
            <div id="auth-login">
                <input type="text" id="login-pseudo" placeholder="Pseudo" maxlength="20" autocomplete="username">
                <input type="password" id="login-password" placeholder="Mot de passe" maxlength="50" autocomplete="current-password">
                <button class="auth-btn" id="login-btn" onclick="doLogin()">Connexion</button>
                <div class="auth-switch">Pas de compte ? <span onclick="showRegister()">Creer un compte</span></div>
            </div>
            <div id="auth-register" style="display:none">
                <input type="text" id="reg-pseudo" placeholder="Pseudo" maxlength="20" autocomplete="username">
                <input type="password" id="reg-password" placeholder="Mot de passe (6 car. min)" maxlength="50" autocomplete="new-password">
                <input type="password" id="reg-password2" placeholder="Confirmer le mot de passe" maxlength="50" autocomplete="new-password">
                <button class="auth-btn" id="reg-btn" onclick="doRegister()">Creer mon compte</button>
                <div class="auth-switch">Deja un compte ? <span onclick="showLogin()">Se connecter</span></div>
            </div>
        </div>
    </div>

    <h1>Pokemon Emeraude Custom</h1>
    <div id="game-container"></div>

    <div id="top-bar" style="display:none">
        <span class="user-info" id="user-display"></span>
        <button onclick="window.open('portal.html','_blank')">Portail</button>
        <button id="arena-btn" onclick="openArenaModal()">Arena</button>
        <button onclick="doLogout()">Deco</button>
    </div>

    <div id="toast"></div>

    <!-- Arena modal -->
    <div id="arena-overlay">
        <div class="arena-card">
            <h3>Devenir Maitre d'Arene</h3>
            <select id="arena-gym" onchange="onGymSelect()">
                <option value="">Choisis une arene...</option>
                <option value="roxanne">Roxanne (Roche)</option>
                <option value="brawly">Bastien (Combat)</option>
                <option value="wattson">Voltere (Electrik)</option>
                <option value="flannery">Adriane (Feu)</option>
                <option value="norman">Norman (Normal)</option>
                <option value="winona">Alizee (Vol)</option>
                <option value="tate_liza">Levy & Tatia (Psy)</option>
                <option value="juan">Juan (Eau)</option>
            </select>
            <div id="arena-team" class="arena-team-preview"></div>
            <div id="arena-status"></div>
            <div class="arena-btns">
                <button class="btn-submit" id="arena-submit" onclick="submitArenaTeam()" disabled>Deposer mon equipe</button>
                <button class="btn-close" onclick="closeArenaModal()">Fermer</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        console.log('[Pokemon] Version 36 - Arena Multi-Champions MVP');

        // ============================================================
        // SUPABASE
        // ============================================================
        var SUPABASE_URL = 'https://oflklqvpqjrggacqypoa.supabase.co';
        var SUPABASE_KEY = 'sb_publishable_cTi55x7b89FizkL-cHwcAw_YCOEC4Xm';
        var _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        var _currentUser = null;

        // ============================================================
        // AUTH
        // ============================================================
        function showLogin() {
            document.getElementById('auth-login').style.display = '';
            document.getElementById('auth-register').style.display = 'none';
            document.getElementById('auth-error').textContent = '';
        }
        function showRegister() {
            document.getElementById('auth-login').style.display = 'none';
            document.getElementById('auth-register').style.display = '';
            document.getElementById('auth-error').textContent = '';
        }

        async function doLogin() {
            var pseudo = document.getElementById('login-pseudo').value.trim();
            var password = document.getElementById('login-password').value;
            if (!pseudo || !password) {
                document.getElementById('auth-error').textContent = 'Remplis tous les champs';
                return;
            }
            document.getElementById('login-btn').disabled = true;
            document.getElementById('auth-error').textContent = 'Connexion...';
            try {
                var res = await _sb.auth.signInWithPassword({
                    email: pseudo.toLowerCase() + '@pokemon.local',
                    password: password
                });
                if (res.error) {
                    document.getElementById('auth-error').textContent = 'Pseudo ou mot de passe incorrect';
                    document.getElementById('login-btn').disabled = false;
                    return;
                }
                _currentUser = res.data.user;
                onAuthSuccess(pseudo);
            } catch(e) {
                document.getElementById('auth-error').textContent = 'Erreur connexion';
                document.getElementById('login-btn').disabled = false;
            }
        }

        async function doRegister() {
            var pseudo = document.getElementById('reg-pseudo').value.trim();
            var password = document.getElementById('reg-password').value;
            var password2 = document.getElementById('reg-password2').value;
            if (!pseudo || !password) {
                document.getElementById('auth-error').textContent = 'Remplis tous les champs';
                return;
            }
            if (!/^[a-zA-Z0-9_]+$/.test(pseudo)) {
                document.getElementById('auth-error').textContent = 'Pseudo: lettres, chiffres et _ uniquement';
                return;
            }
            if (password.length < 6) {
                document.getElementById('auth-error').textContent = 'Mot de passe trop court (6 car. min)';
                return;
            }
            if (password !== password2) {
                document.getElementById('auth-error').textContent = 'Les mots de passe ne correspondent pas';
                return;
            }
            document.getElementById('reg-btn').disabled = true;
            document.getElementById('auth-error').textContent = 'Creation du compte...';
            try {
                var res = await _sb.auth.signUp({
                    email: pseudo.toLowerCase() + '@pokemon.local',
                    password: password,
                    options: { data: { pseudo: pseudo } }
                });
                if (res.error) {
                    var msg = 'Erreur: ' + res.error.message;
                    if (res.error.message.includes('already registered')) msg = 'Ce pseudo est deja pris';
                    document.getElementById('auth-error').textContent = msg;
                    document.getElementById('reg-btn').disabled = false;
                    return;
                }
                if (!res.data.session) {
                    document.getElementById('auth-error').textContent = 'Compte cree ! Connecte-toi maintenant.';
                    document.getElementById('reg-btn').disabled = false;
                    showLogin();
                    document.getElementById('login-pseudo').value = pseudo;
                    return;
                }
                _currentUser = res.data.user;
                onAuthSuccess(pseudo);
            } catch(e) {
                document.getElementById('auth-error').textContent = 'Erreur creation';
                document.getElementById('reg-btn').disabled = false;
            }
        }

        // Per-user SRAM localStorage key
        function sramKey() {
            return _currentUser ? 'pokeemerald_sram_' + _currentUser.id : null;
        }

        function onAuthSuccess(pseudo) {
            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('top-bar').style.display = '';
            document.getElementById('user-display').textContent = pseudo;
            console.log('[Auth] Logged in as: ' + pseudo);
            restoreUserSRAM();
        }

        async function doLogout() {
            await _sb.auth.signOut();
            _currentUser = null;
            _sramInjected = false;
            location.reload();
        }

        // Auto-login from existing session
        (async function checkSession() {
            try {
                var res = await _sb.auth.getSession();
                if (res.data.session && res.data.session.user) {
                    _currentUser = res.data.session.user;
                    var pseudo = _currentUser.user_metadata && _currentUser.user_metadata.pseudo
                        ? _currentUser.user_metadata.pseudo
                        : _currentUser.email.split('@')[0];
                    onAuthSuccess(pseudo);
                }
            } catch(e) {
                console.warn('[Auth] Session check failed:', e);
            }
        })();

        // Enter key support
        document.getElementById('login-password').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doLogin();
        });
        document.getElementById('reg-password2').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doRegister();
        });

        // Persistent storage
        if (navigator.storage && navigator.storage.persist) {
            navigator.storage.persist().then(function(g) {
                console.log('[Save] Persistent storage:', g ? 'granted' : 'denied');
            });
        }

        // ============================================================
        // EMULATORJS CONFIG
        // ============================================================
        EJS_player = '#game-container';
        EJS_core = 'gba';
        EJS_gameUrl = 'rom/pokemon.gba?v=36';
        EJS_gameName = 'pokeemerald_custom';
        EJS_color = '#e94560';
        EJS_startOnLoaded = true;
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';

        // ============================================================
        // SRAM SYSTEM - Only save method, per-user, cloud-backed
        // ============================================================
        var _sramInjected = false;
        var _lastSramHash = '';

        // Restore SRAM for the logged-in user (cloud-only, no local cache)
        function restoreUserSRAM() {
            if (!_currentUser) return;

            console.log('[SRAM] Fetching save from cloud...');
            _sb.from('saves')
                .select('save_data')
                .eq('user_id', _currentUser.id)
                .eq('slot_name', '__sram__')
                .single().then(function(res) {
                    if (res.data && res.data.save_data) {
                        console.log('[SRAM] Cloud save found, injecting...');
                        tryInjectSRAM(res.data.save_data);
                    } else {
                        console.log('[SRAM] No cloud save - new player');
                    }
                }).catch(function(err) {
                    console.warn('[SRAM] Cloud fetch failed:', err);
                });
        }

        // Wait for emulator then inject
        function tryInjectSRAM(b64) {
            if (_sramInjected) return;
            if (!window.EJS_emulator || !window.EJS_emulator.gameManager) {
                setTimeout(function() { tryInjectSRAM(b64); }, 1000);
                return;
            }
            setTimeout(function() {
                var ok = injectSRAM(b64);
                if (ok) {
                    _sramInjected = true;
                    toast('Sauvegarde restauree !');
                }
            }, 2000);
        }

        // Write SRAM into emulator FS, reload into core, restart game
        function injectSRAM(b64) {
            try {
                var bin = atob(b64);
                var bytes = new Uint8Array(bin.length);
                for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);

                var gm = window.EJS_emulator.gameManager;

                // Get the exact path the core expects
                var savePath = null;
                if (typeof gm.getSaveFilePath === 'function') {
                    savePath = gm.getSaveFilePath();
                }
                if (!savePath) {
                    savePath = '/data/saves/' + (EJS_gameName || 'pokemon') + '.srm';
                }
                console.log('[SRAM] Save path: ' + savePath);

                // Write to FS
                var FS = gm.FS || (gm.Module && gm.Module.FS);
                if (!FS) { console.warn('[SRAM] No FS'); return false; }
                FS.writeFile(savePath, bytes);
                console.log('[SRAM] Written ' + bytes.length + 'B');

                // Tell core to re-read SRAM from FS
                if (typeof gm.loadSaveFiles === 'function') gm.loadSaveFiles();

                // Restart game so it sees the SRAM
                if (typeof gm.restart === 'function') gm.restart();

                console.log('[SRAM] Injected + restarted');
                return true;
            } catch(e) {
                console.warn('[SRAM] Injection failed:', e);
                return false;
            }
        }

        // Hash to detect SRAM changes
        function hashBytes(data) {
            var h = 0;
            for (var i = 0; i < data.length; i += 64) {
                h = ((h << 5) - h + data[i]) | 0;
            }
            return h.toString();
        }

        function countNonEmpty(data) {
            var count = 0;
            for (var i = 0; i < data.length; i += 16) {
                if (data[i] !== 0 && data[i] !== 0xFF) count++;
            }
            return count;
        }

        // Backup SRAM to localStorage + cloud (called every 10s)
        function backupSRAM() {
            try {
                if (!_currentUser) return;
                var gm = window.EJS_emulator.gameManager;
                gm.saveSaveFiles();
                var sav = gm.getSaveFile();
                if (!sav || sav.length === 0) return;

                var hash = hashBytes(sav);
                if (hash === _lastSramHash) return;
                _lastSramHash = hash;

                var nonEmpty = countNonEmpty(sav);
                if (nonEmpty < 5) return; // Blank save

                var bin = '';
                for (var i = 0; i < sav.length; i++) bin += String.fromCharCode(sav[i]);
                var b64 = btoa(bin);

                console.log('[SRAM] Backup OK (' + sav.length + 'B, ' + nonEmpty + ' sectors)');

                // Upload to Supabase (only source of truth)
                _sb.from('saves').upsert({
                    user_id: _currentUser.id,
                    slot_name: '__sram__',
                    save_data: b64,
                    save_type: 'sram',
                    updated_at: new Date().toISOString()
                }, { onConflict: 'user_id,slot_name' }).then(function(res) {
                    if (res.error) {
                        console.warn('[SRAM] Cloud failed:', res.error.message);
                        toast('Erreur sauvegarde cloud !', true);
                    } else {
                        console.log('[SRAM] Cloud OK');
                        toast('Sauvegarde reussie !');
                    }
                });
            } catch(e) {}
        }

        // Wait for emulator ready
        var _waitReady = setInterval(function() {
            try {
                if (window.EJS_emulator && window.EJS_emulator.gameManager) {
                    clearInterval(_waitReady);
                    console.log('[Save] Emulator ready');

                    // If already logged in, restore SRAM
                    if (_currentUser && !_sramInjected) {
                        restoreUserSRAM();
                    }

                    // Start SRAM backup polling after 5s
                    setTimeout(function() {
                        setInterval(backupSRAM, 10000);
                        console.log('[SRAM] Backup active (every 10s)');
                    }, 5000);
                }
            } catch(e) {}
        }, 1000);

        // Emergency SRAM backup on page close
        function emergencyBackup() {
            backupSRAM();
        }
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'hidden') emergencyBackup();
        });
        window.addEventListener('pagehide', emergencyBackup);
        window.addEventListener('beforeunload', emergencyBackup);

        // ============================================================
        // UTILS
        // ============================================================
        function toast(msg, isError) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = isError ? 'rgba(255, 50, 50, 0.9)' : 'rgba(0, 200, 83, 0.9)';
            t.classList.add('show');
            setTimeout(function() { t.classList.remove('show'); }, 2500);
        }

    </script>
    <script src="js/sram-parser.js"></script>
    <script>
        // ============================================================
        // ARENA SYSTEM
        // ============================================================
        var _speciesNames = null;
        var _movesNames = null;
        var _itemsNames = null;
        var _speciesTypes = null;
        var _arenaParty = null;    // full party from SRAM
        var _arenaFiltered = null; // filtered by gym type
        var _arenaBadges = null;   // [bool x8]

        // Gym definitions with badge index (0-based) and type IDs
        var ARENA_GYMS = {
            roxanne:   { badge: 0, typeId: 6,  typeFr: 'Roche' },
            brawly:    { badge: 1, typeId: 2,  typeFr: 'Combat' },
            wattson:   { badge: 2, typeId: 14, typeFr: 'Electrik' },
            flannery:  { badge: 3, typeId: 11, typeFr: 'Feu' },
            norman:    { badge: 4, typeId: 1,  typeFr: 'Normal' },
            winona:    { badge: 5, typeId: 3,  typeFr: 'Vol' },
            tate_liza: { badge: 6, typeId: 15, typeFr: 'Psy' },
            juan:      { badge: 7, typeId: 12, typeFr: 'Eau' },
        };

        // Load lookup tables lazily
        async function loadLookupTables() {
            if (_speciesNames) return;
            try {
                var [sp, mv, it, st] = await Promise.all([
                    fetch('data/species_names.json').then(function(r) { return r.json(); }),
                    fetch('data/moves_names.json').then(function(r) { return r.json(); }),
                    fetch('data/items_names.json').then(function(r) { return r.json(); }),
                    fetch('data/species_types.json').then(function(r) { return r.json(); }),
                ]);
                _speciesNames = sp;
                _movesNames = mv;
                _itemsNames = it;
                _speciesTypes = st;
                console.log('[Arena] Lookup tables loaded');
            } catch(e) {
                console.warn('[Arena] Failed to load lookup tables:', e);
            }
        }

        function openArenaModal() {
            document.getElementById('arena-overlay').classList.add('open');
            document.getElementById('arena-gym').value = '';
            document.getElementById('arena-team').innerHTML = '';
            document.getElementById('arena-status').textContent = '';
            document.getElementById('arena-submit').disabled = true;
            _arenaParty = null;
            _arenaFiltered = null;
            _arenaBadges = null;
            loadLookupTables();
            extractCurrentParty();
        }

        function closeArenaModal() {
            document.getElementById('arena-overlay').classList.remove('open');
        }

        function extractCurrentParty() {
            try {
                var gm = window.EJS_emulator && window.EJS_emulator.gameManager;
                if (!gm) {
                    setArenaStatus('Emulateur non pret', true);
                    return;
                }
                gm.saveSaveFiles();
                var sav = gm.getSaveFile();
                if (!sav || sav.length === 0) {
                    setArenaStatus('Pas de sauvegarde detectee', true);
                    return;
                }
                var result = SRAMParser.extractParty(sav);
                if (!result.party.length) {
                    setArenaStatus('Aucun Pokemon dans l\'equipe', true);
                    return;
                }
                _arenaParty = result.party;
                _arenaBadges = result.badges || [];
                console.log('[Arena] Badges:', _arenaBadges);
                renderPartyPreview(result.party, null);
                setArenaStatus('Selectionne une arene ci-dessus', false);
            } catch(e) {
                console.error('[Arena] Parse error:', e);
                setArenaStatus('Erreur lecture sauvegarde: ' + e.message, true);
            }
        }

        // Check if a Pokemon has a given type
        function pokemonHasType(speciesId, typeId) {
            if (!_speciesTypes) return true; // fallback: allow all if types not loaded
            var types = _speciesTypes[speciesId];
            if (!types) return false;
            return types.indexOf(typeId) !== -1;
        }

        function renderPartyPreview(party, gymTypeId) {
            var html = '';
            for (var i = 0; i < party.length; i++) {
                var p = party[i];
                var name = (_speciesNames && _speciesNames[p.species]) || p.nickname || ('Pokemon #' + p.species);
                var item = p.heldItem > 0 && _itemsNames ? (_itemsNames[p.heldItem] || '') : '';
                var matchesType = gymTypeId === null || pokemonHasType(p.species, gymTypeId);
                var opacity = matchesType ? '1' : '0.3';
                var badge = matchesType ? '' : ' <span style="color:#ff5555;font-size:0.7rem;">(type incompatible)</span>';
                html += '<div class="arena-pokemon" style="opacity:' + opacity + '">' +
                    '<div><span class="poke-name">' + name + '</span>' + badge +
                    (item ? ' <span class="poke-item">@ ' + item + '</span>' : '') +
                    '</div>' +
                    '<span class="poke-level">Nv.' + p.level + '</span>' +
                    '</div>';
            }
            document.getElementById('arena-team').innerHTML = html;
        }

        async function onGymSelect() {
            var gymId = document.getElementById('arena-gym').value;
            var submitBtn = document.getElementById('arena-submit');
            submitBtn.disabled = true;
            _arenaFiltered = null;

            if (!gymId || !_arenaParty) {
                if (_arenaParty) renderPartyPreview(_arenaParty, null);
                return;
            }

            var gym = ARENA_GYMS[gymId];
            if (!gym) return;

            // Check badge
            if (_arenaBadges && !_arenaBadges[gym.badge]) {
                setArenaStatus('Tu n\'as pas le badge ' + gym.typeFr + ' ! Bats d\'abord le champion.', true);
                renderPartyPreview(_arenaParty, gym.typeId);
                return;
            }

            // Filter party by gym type
            _arenaFiltered = _arenaParty.filter(function(p) {
                return pokemonHasType(p.species, gym.typeId);
            });

            renderPartyPreview(_arenaParty, gym.typeId);

            if (_arenaFiltered.length === 0) {
                setArenaStatus('Aucun Pokemon de type ' + gym.typeFr + ' dans ton equipe !', true);
                return;
            }

            // Check if already a master
            try {
                var res = await _sb.from('arena_masters')
                    .select('master_pseudo')
                    .eq('gym_id', gymId)
                    .single();
                if (res.data) {
                    setArenaStatus('Maitre actuel : ' + res.data.master_pseudo + ' — ' + _arenaFiltered.length + ' Pokemon ' + gym.typeFr + ' seront deposes', false);
                } else {
                    setArenaStatus('Aucun maitre — ' + _arenaFiltered.length + ' Pokemon ' + gym.typeFr + ' seront deposes', false);
                }
            } catch(e) {
                setArenaStatus(_arenaFiltered.length + ' Pokemon ' + gym.typeFr + ' seront deposes', false);
            }
            submitBtn.disabled = false;
        }

        async function submitArenaTeam() {
            var gymId = document.getElementById('arena-gym').value;
            if (!gymId || !_arenaFiltered || !_arenaFiltered.length || !_currentUser) return;

            var gym = ARENA_GYMS[gymId];
            if (!gym) return;

            // Double-check badge
            if (_arenaBadges && !_arenaBadges[gym.badge]) {
                setArenaStatus('Badge manquant !', true);
                return;
            }

            document.getElementById('arena-submit').disabled = true;
            setArenaStatus('Envoi en cours...', false);

            var pseudo = _currentUser.user_metadata && _currentUser.user_metadata.pseudo
                ? _currentUser.user_metadata.pseudo
                : _currentUser.email.split('@')[0];

            // Build team JSON from FILTERED party only
            var team = _arenaFiltered.map(function(p) {
                return {
                    species: p.species,
                    speciesName: (_speciesNames && _speciesNames[p.species]) || p.nickname,
                    heldItem: p.heldItem,
                    itemName: p.heldItem > 0 && _itemsNames ? (_itemsNames[p.heldItem] || null) : null,
                    level: p.level,
                    moves: p.moves.map(function(m) {
                        return { id: m, name: _movesNames ? (_movesNames[m] || '???') : '???' };
                    }),
                    hp: p.maxHP, attack: p.attack, defense: p.defense,
                    speed: p.speed, spAttack: p.spAttack, spDefense: p.spDefense,
                };
            });

            try {
                var res = await _sb.from('arena_masters').upsert({
                    gym_id: gymId,
                    master_pseudo: pseudo,
                    master_user_id: _currentUser.id,
                    team: team,
                    updated_at: new Date().toISOString()
                }, { onConflict: 'gym_id' });

                if (res.error) {
                    setArenaStatus('Erreur: ' + res.error.message, true);
                    document.getElementById('arena-submit').disabled = false;
                } else {
                    setArenaStatus('Tu es le nouveau Maitre ' + gym.typeFr + ' !', false);
                    toast('Maitre d\'arene enregistre !');
                    setTimeout(closeArenaModal, 2000);
                }
            } catch(e) {
                setArenaStatus('Erreur reseau', true);
                document.getElementById('arena-submit').disabled = false;
            }
        }

        function setArenaStatus(msg, isError) {
            var el = document.getElementById('arena-status');
            el.textContent = msg;
            el.style.color = isError ? '#ff5555' : '#0f8';
        }
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
