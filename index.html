<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pokemon Emeraude Custom</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        body {
            background: #1a1a2e;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 100vh; min-height: 100dvh;
            font-family: 'Segoe UI', sans-serif; color: white;
            overflow: hidden; -webkit-user-select: none; user-select: none;
        }
        h1 { font-size: 1.2rem; margin: 8px 0; text-align: center; color: #e94560; }
        #game-container {
            position: relative; width: 100vw;
            height: calc(100vh - 40px); height: calc(100dvh - 40px);
            max-width: 800px; max-height: 600px;
        }
        @media (max-width: 768px) {
            #game-container { width: 100vw; height: 100vh; height: 100dvh; max-width: none; max-height: none; }
            h1 { display: none; }
        }
        /* Save buttons */
        #save-bar {
            position: fixed; top: 6px; right: 6px; z-index: 10001;
            display: flex; gap: 5px;
        }
        #save-bar button {
            background: rgba(233, 69, 96, 0.85); color: white; border: none;
            border-radius: 8px; padding: 8px 14px; font-size: 0.8rem; font-weight: bold;
            cursor: pointer; touch-action: manipulation; backdrop-filter: blur(4px);
        }
        #save-bar button:active { opacity: 0.6; }
        #save-bar button.green { background: rgba(0, 180, 80, 0.85); }
        /* Toast */
        #toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 200, 83, 0.9); color: white;
            padding: 10px 24px; border-radius: 20px;
            font-size: 0.85rem; font-weight: bold;
            z-index: 10001; pointer-events: none;
            opacity: 0; transition: opacity 0.3s ease;
        }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>
    <h1>Pokemon Emeraude Custom</h1>
    <div id="game-container"></div>
    <div id="save-bar">
        <button class="green" onclick="doQuickSave()">Sauver</button>
        <button onclick="doQuickLoad()">Charger</button>
    </div>
    <div id="toast"></div>

    <script>
        // Persistent storage
        if (navigator.storage && navigator.storage.persist) {
            navigator.storage.persist().then(function(g) {
                console.log('[Save] Persistent storage:', g ? 'granted' : 'denied');
            });
        }

        // ============================================================
        // EmulatorJS config
        // ============================================================
        EJS_player = '#game-container';
        EJS_core = 'gba';
        EJS_gameUrl = 'rom/pokemon.gba';
        EJS_gameName = 'pokeemerald_custom';
        EJS_color = '#e94560';
        EJS_startOnLoaded = true;
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';

        // ============================================================
        // SAVE SYSTEM v8 - Using official EmulatorJS API
        // ============================================================
        // Two layers:
        // 1. SRAM (in-game save): getSaveFile() -> localStorage -> EJS_gameSaveUrl
        // 2. Save states: EJS_onSaveState/EJS_onLoadState -> IndexedDB (no downloads!)
        // ============================================================

        var SRAM_KEY = 'pokeemerald_sram';
        var STATE_KEY = 'pokeemerald_state';

        // --- SRAM RESTORE (before loader.js) ---
        (function() {
            var b64 = localStorage.getItem(SRAM_KEY);
            if (b64) {
                try {
                    var bin = atob(b64);
                    var bytes = new Uint8Array(bin.length);
                    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
                    var blob = new Blob([bytes], { type: 'application/octet-stream' });
                    EJS_gameSaveUrl = URL.createObjectURL(blob);
                    console.log('[Save] SRAM restored from localStorage (' + bytes.length + 'B)');
                } catch(e) {
                    console.warn('[Save] SRAM restore failed:', e);
                }
            } else {
                console.log('[Save] No previous SRAM save');
            }
        })();

        // --- Intercept save state button -> IndexedDB (NO download!) ---
        EJS_onSaveState = function(data) {
            try {
                // Store in IndexedDB via EmulatorJS built-in storage
                window.EJS_emulator.storage.states.put(STATE_KEY, data.state).then(function() {
                    console.log('[Save] State saved to IndexedDB (' + data.state.length + 'B)');
                    toast('State sauvegardee !');
                });
                // Also backup SRAM while we're at it
                backupSRAM('save-state-trigger');
            } catch(e) {
                console.error('[Save] State save error:', e);
                // Fallback: store in localStorage as base64
                try {
                    var bin = '';
                    for (var i = 0; i < data.state.length; i++) bin += String.fromCharCode(data.state[i]);
                    localStorage.setItem(STATE_KEY, btoa(bin));
                    console.log('[Save] State saved to localStorage fallback');
                    toast('State sauvegardee !');
                } catch(e2) {
                    toast('Erreur sauvegarde !', true);
                }
            }
        };

        // --- Intercept load state button -> load from IndexedDB (NO file picker!) ---
        EJS_onLoadState = function() {
            try {
                window.EJS_emulator.storage.states.get(STATE_KEY).then(function(state) {
                    if (state) {
                        window.EJS_emulator.gameManager.loadState(new Uint8Array(state));
                        console.log('[Save] State loaded from IndexedDB');
                        toast('State chargee !');
                    } else {
                        // Try localStorage fallback
                        var b64 = localStorage.getItem(STATE_KEY);
                        if (b64) {
                            var bin = atob(b64);
                            var bytes = new Uint8Array(bin.length);
                            for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
                            window.EJS_emulator.gameManager.loadState(bytes);
                            console.log('[Save] State loaded from localStorage fallback');
                            toast('State chargee !');
                        } else {
                            toast('Pas de state sauvegardee', true);
                        }
                    }
                });
            } catch(e) {
                console.error('[Save] State load error:', e);
                toast('Erreur chargement !', true);
            }
        };

        // --- SRAM backup using official API ---
        var _sramActive = false;

        function backupSRAM(reason) {
            try {
                var gm = window.EJS_emulator.gameManager;
                // Flush core SRAM to virtual FS first
                gm.saveSaveFiles();
                // Get save file bytes via official API
                var data = gm.getSaveFile(false);
                if (!data || data.length === 0) {
                    if (reason === 'manual') console.log('[Save] SRAM: getSaveFile() returned empty');
                    return false;
                }
                // Store as base64 in localStorage
                var bin = '';
                for (var i = 0; i < data.length; i++) bin += String.fromCharCode(data[i]);
                localStorage.setItem(SRAM_KEY, btoa(bin));
                if (!_sramActive) {
                    _sramActive = true;
                    console.log('[Save] SRAM first backup OK (' + data.length + 'B) via getSaveFile()');
                    toast('Sauvegardes SRAM actives');
                }
                return true;
            } catch(e) {
                if (reason === 'manual') console.log('[Save] SRAM backup error:', e);
                return false;
            }
        }

        // --- Quick Save/Load buttons ---
        function doQuickSave() {
            try {
                var gm = window.EJS_emulator.gameManager;
                // Save state to IndexedDB
                var state = gm.getState();
                if (state && state.length > 0) {
                    window.EJS_emulator.storage.states.put(STATE_KEY, state).then(function() {
                        console.log('[Save] Quick save OK (' + state.length + 'B)');
                        toast('Sauvegarde rapide OK !');
                    }).catch(function(e) {
                        // IndexedDB fallback to localStorage
                        var bin = '';
                        for (var i = 0; i < state.length; i++) bin += String.fromCharCode(state[i]);
                        localStorage.setItem(STATE_KEY, btoa(bin));
                        console.log('[Save] Quick save to localStorage fallback');
                        toast('Sauvegarde rapide OK !');
                    });
                    // Also backup SRAM
                    backupSRAM('quick-save');
                } else {
                    toast('Jeu pas encore pret', true);
                }
            } catch(e) {
                console.error('[Save] Quick save error:', e);
                toast('Erreur: ' + e.message, true);
            }
        }

        function doQuickLoad() {
            try {
                window.EJS_emulator.storage.states.get(STATE_KEY).then(function(state) {
                    if (state) {
                        window.EJS_emulator.gameManager.loadState(new Uint8Array(state));
                        console.log('[Save] Quick load OK');
                        toast('Chargement OK !');
                    } else {
                        // Try localStorage fallback
                        var b64 = localStorage.getItem(STATE_KEY);
                        if (b64) {
                            var bin = atob(b64);
                            var bytes = new Uint8Array(bin.length);
                            for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
                            window.EJS_emulator.gameManager.loadState(bytes);
                            console.log('[Save] Quick load from localStorage fallback');
                            toast('Chargement OK !');
                        } else {
                            toast('Pas de sauvegarde !', true);
                        }
                    }
                }).catch(function(e) {
                    console.error('[Save] Quick load error:', e);
                    toast('Erreur chargement', true);
                });
            } catch(e) {
                console.error('[Save] Quick load error:', e);
                toast('Erreur: jeu pas pret', true);
            }
        }

        // --- Auto-save state every 30 seconds ---
        var _autoSaveStarted = false;
        function startAutoSave() {
            if (_autoSaveStarted) return;
            _autoSaveStarted = true;
            setInterval(function() {
                try {
                    var state = window.EJS_emulator.gameManager.getState();
                    if (state && state.length > 0) {
                        window.EJS_emulator.storage.states.put(STATE_KEY + '_auto', state).catch(function() {
                            // Silent fallback - auto save is bonus
                        });
                        // Also SRAM backup
                        backupSRAM('auto');
                    }
                } catch(e) {}
            }, 30000);
            console.log('[Save] Auto-save active (every 30s)');
        }

        // --- Wait for emulator to be ready ---
        var _waitReady = setInterval(function() {
            try {
                if (window.EJS_emulator && window.EJS_emulator.gameManager) {
                    clearInterval(_waitReady);
                    console.log('[Save] Emulator ready');
                    // Start auto-save after a delay (let game fully init)
                    setTimeout(startAutoSave, 5000);
                    // Try first SRAM backup
                    setTimeout(function() { backupSRAM('init'); }, 8000);
                }
            } catch(e) {}
        }, 1000);

        // --- Emergency save on page close ---
        function emergencySave() {
            try {
                var state = window.EJS_emulator.gameManager.getState();
                if (state && state.length > 0) {
                    // localStorage is synchronous = guaranteed on page close
                    var bin = '';
                    for (var i = 0; i < state.length; i++) bin += String.fromCharCode(state[i]);
                    localStorage.setItem(STATE_KEY, btoa(bin));
                }
                backupSRAM('emergency');
            } catch(e) {}
        }
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'hidden') emergencySave();
        });
        window.addEventListener('pagehide', emergencySave);
        window.addEventListener('beforeunload', emergencySave);

        // --- Toast notification ---
        function toast(msg, isError) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = isError ? 'rgba(255, 50, 50, 0.9)' : 'rgba(0, 200, 83, 0.9)';
            t.classList.add('show');
            setTimeout(function() { t.classList.remove('show'); }, 2500);
        }
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
