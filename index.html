<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pokemon Emeraude Custom</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        body {
            background: #1a1a2e;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 100vh; min-height: 100dvh;
            font-family: 'Segoe UI', sans-serif; color: white;
            overflow: hidden; -webkit-user-select: none; user-select: none;
        }
        h1 { font-size: 1.2rem; margin: 8px 0; text-align: center; color: #e94560; }
        #game-container {
            position: relative; width: 100vw;
            height: calc(100vh - 40px); height: calc(100dvh - 40px);
            max-width: 800px; max-height: 600px;
        }
        @media (max-width: 768px) {
            #game-container { width: 100vw; height: 100vh; height: 100dvh; max-width: none; max-height: none; }
            h1 { display: none; }
        }

        /* Top bar — burger menu */
        #top-bar {
            position: fixed; top: 6px; left: 6px; z-index: 10001;
        }
        #menu-toggle {
            background: rgba(0,180,80,0.2); color: #0f8; border: 1px solid rgba(0,180,80,0.4);
            border-radius: 10px; padding: 7px 14px; font-size: 0.8rem; font-weight: bold;
            cursor: pointer; touch-action: manipulation; display: flex; align-items: center; gap: 6px;
        }
        #menu-toggle:active { opacity: 0.7; }
        #menu-toggle .arrow { font-size: 0.5rem; transition: transform 0.2s; }
        #menu-toggle.open .arrow { transform: rotate(180deg); }
        #menu-dropdown {
            display: none; position: absolute; top: 100%; left: 0; margin-top: 4px;
            background: #16213e; border: 1px solid #333; border-radius: 10px;
            min-width: 160px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        #menu-dropdown.open { display: block; }
        #menu-dropdown button {
            display: flex; align-items: center; gap: 8px; width: 100%;
            background: none; color: white; border: none; padding: 12px 16px;
            font-size: 0.85rem; cursor: pointer; text-align: left;
        }
        #menu-dropdown button:hover { background: rgba(255,255,255,0.05); }
        #menu-dropdown button:active { background: rgba(255,255,255,0.1); }
        #menu-dropdown button .icon { width: 16px; text-align: center; }
        #menu-dropdown .sep { height: 1px; background: #333; margin: 2px 8px; }
        #menu-dropdown .btn-arena { color: #e94560; }
        #menu-dropdown .btn-pvp { color: #f39c12; }
        #menu-dropdown .btn-deco { color: #888; }

        /* Arena modal */
        #arena-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 60000;
            align-items: center; justify-content: center;
        }
        #arena-overlay.open { display: flex; }
        .arena-card {
            background: #16213e; border: 2px solid #e94560; border-radius: 16px;
            padding: 24px; width: 92%; max-width: 400px; max-height: 85vh;
            overflow-y: auto; text-align: center;
        }
        .arena-card h3 { color: #e94560; margin-bottom: 14px; font-size: 1.15rem; }
        .arena-card select {
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #555;
            background: #1a1a2e; color: white; font-size: 0.95rem; margin-bottom: 14px;
        }
        .arena-team-preview { text-align: left; margin-bottom: 14px; }
        .arena-pokemon {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 10px; background: rgba(255,255,255,0.05); border-radius: 8px;
            margin-bottom: 4px; font-size: 0.85rem;
        }
        .arena-pokemon .poke-name { font-weight: bold; color: #0f8; }
        .arena-pokemon .poke-level { color: #aaa; }
        .arena-pokemon .poke-item { color: #f5a623; font-size: 0.75rem; }
        .arena-btns { display: flex; gap: 8px; margin-top: 10px; }
        .arena-btns button {
            flex: 1; padding: 10px; border: none; border-radius: 8px;
            font-size: 0.9rem; font-weight: bold; cursor: pointer;
        }
        .arena-btns .btn-submit { background: #e94560; color: white; }
        .arena-btns .btn-submit:disabled { opacity: 0.4; }
        .arena-btns .btn-close { background: #333; color: #aaa; }
        #arena-status { font-size: 0.8rem; margin-top: 8px; min-height: 1.2em; }

        /* PvP modal */
        #pvp-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 60000;
            align-items: center; justify-content: center;
        }
        #pvp-overlay.open { display: flex; }
        .pvp-card {
            background: #16213e; border: 2px solid #f39c12; border-radius: 16px;
            padding: 24px; width: 92%; max-width: 420px; max-height: 85vh;
            overflow-y: auto; text-align: center;
        }
        .pvp-card h3 { color: #f39c12; margin-bottom: 14px; font-size: 1.15rem; }
        .pvp-ladder { text-align: left; margin-bottom: 14px; }
        .pvp-row {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 12px; border-radius: 8px; margin-bottom: 4px;
            font-size: 0.85rem; transition: background 0.15s;
        }
        .pvp-row.is-me { background: rgba(243,156,18,0.15); border: 1px solid rgba(243,156,18,0.4); }
        .pvp-row.is-target { background: rgba(255,85,85,0.1); border: 1px dashed rgba(255,85,85,0.5); }
        .pvp-row:not(.is-me):not(.is-target) { background: rgba(255,255,255,0.03); }
        .pvp-rank { font-weight: bold; min-width: 28px; text-align: center; color: #f39c12; font-size: 1rem; }
        .pvp-rank.gold { color: #ffd700; }
        .pvp-rank.silver { color: #c0c0c0; }
        .pvp-rank.bronze { color: #cd7f32; }
        .pvp-pseudo { font-weight: bold; flex: 1; }
        .pvp-pseudo.me { color: #f39c12; }
        .pvp-pseudo.target { color: #ff5555; }
        .pvp-meta { color: #888; font-size: 0.75rem; }
        .pvp-warning {
            font-size: 0.75rem; color: #ff9800; padding: 8px; background: rgba(243,156,18,0.1);
            border-radius: 6px; margin: 10px 0;
        }
        .pvp-btns { display: flex; gap: 8px; margin-top: 10px; }
        .pvp-btns button {
            flex: 1; padding: 10px; border: none; border-radius: 8px;
            font-size: 0.9rem; font-weight: bold; cursor: pointer;
        }
        .pvp-btns .btn-pvp-go { background: #f39c12; color: white; }
        .pvp-btns .btn-pvp-go:disabled { opacity: 0.4; }
        .pvp-btns .btn-pvp-close { background: #333; color: #aaa; }
        #pvp-status { font-size: 0.8rem; margin-top: 8px; min-height: 1.2em; }

        /* Toast */
        #toast {
            position: fixed; top: 50px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 200, 83, 0.9); color: white;
            padding: 12px 28px; border-radius: 20px;
            font-size: 1rem; font-weight: bold;
            z-index: 99999; pointer-events: none;
            opacity: 0; transition: opacity 0.3s ease;
            text-align: center; max-width: 90%;
        }
        #toast.show { opacity: 1; }

        /* Auth overlay */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a2e; z-index: 50000;
            display: flex; align-items: center; justify-content: center;
        }
        #auth-overlay.hidden { display: none; }
        .auth-card {
            background: #16213e; border: 2px solid #e94560; border-radius: 16px;
            padding: 30px; width: 90%; max-width: 360px; text-align: center;
        }
        .auth-card h2 { color: #e94560; margin-bottom: 6px; font-size: 1.3rem; }
        .auth-card .subtitle { color: #888; font-size: 0.8rem; margin-bottom: 20px; }
        .auth-card input {
            width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px;
            border: 1px solid #555; background: #1a1a2e; color: white;
            font-size: 1rem; outline: none;
        }
        .auth-card input:focus { border-color: #e94560; }
        .auth-card .auth-btn {
            width: 100%; padding: 12px; background: #e94560; color: white;
            border: none; border-radius: 8px; font-size: 1rem; font-weight: bold;
            cursor: pointer; margin-bottom: 10px;
        }
        .auth-card .auth-btn:disabled { opacity: 0.5; }
        .auth-card .auth-switch { color: #888; font-size: 0.85rem; cursor: pointer; }
        .auth-card .auth-switch span { color: #e94560; text-decoration: underline; }
        .auth-card .auth-error {
            color: #ff5555; font-size: 0.8rem; margin-bottom: 10px; min-height: 1.2em;
        }
    </style>
</head>
<body>
    <!-- Auth overlay -->
    <div id="auth-overlay">
        <div class="auth-card">
            <h2>Pokemon Emeraude</h2>
            <div class="subtitle">Connecte-toi pour jouer</div>
            <div id="auth-error" class="auth-error"></div>
            <div id="auth-login">
                <input type="text" id="login-pseudo" placeholder="Pseudo" maxlength="20" autocomplete="username">
                <input type="password" id="login-password" placeholder="Mot de passe" maxlength="50" autocomplete="current-password">
                <button class="auth-btn" id="login-btn" onclick="doLogin()">Connexion</button>
                <div class="auth-switch">Pas de compte ? <span onclick="showRegister()">Creer un compte</span></div>
            </div>
            <div id="auth-register" style="display:none">
                <input type="text" id="reg-pseudo" placeholder="Pseudo" maxlength="20" autocomplete="username">
                <input type="password" id="reg-password" placeholder="Mot de passe (6 car. min)" maxlength="50" autocomplete="new-password">
                <input type="password" id="reg-password2" placeholder="Confirmer le mot de passe" maxlength="50" autocomplete="new-password">
                <button class="auth-btn" id="reg-btn" onclick="doRegister()">Creer mon compte</button>
                <div class="auth-switch">Deja un compte ? <span onclick="showLogin()">Se connecter</span></div>
            </div>
        </div>
    </div>

    <h1>Pokemon Emeraude Custom</h1>
    <div id="game-container"></div>

    <div id="top-bar" style="display:none">
        <button id="menu-toggle" onclick="toggleMenu()">
            <span id="user-display"></span>
            <span class="arrow">&#9660;</span>
        </button>
        <div id="menu-dropdown">
            <button onclick="window.open('portal.html','_blank');toggleMenu()"><span class="icon">&#127760;</span> Portail</button>
            <button class="btn-arena" onclick="openArenaModal();toggleMenu()"><span class="icon">&#9876;</span> Arena</button>
            <button class="btn-pvp" onclick="openPvPModal();toggleMenu()"><span class="icon">&#9889;</span> PvP</button>
            <div class="sep"></div>
            <button class="btn-deco" onclick="doLogout()"><span class="icon">&#10140;</span> Deconnexion</button>
        </div>
    </div>

    <div id="toast"></div>

    <!-- Arena modal -->
    <div id="arena-overlay">
        <div class="arena-card">
            <h3>Arene Multi-Champions</h3>
            <select id="arena-gym" onchange="onGymSelect()">
                <option value="">Choisis une arene...</option>
                <option value="roxanne">Roxanne (Roche)</option>
                <option value="brawly">Bastien (Combat)</option>
                <option value="wattson">Voltere (Electrik)</option>
                <option value="flannery">Adriane (Feu)</option>
                <option value="norman">Norman (Normal)</option>
                <option value="winona">Alizee (Vol)</option>
                <option value="tate_liza">Levy & Tatia (Psy)</option>
                <option value="juan">Juan (Eau)</option>
            </select>
            <div id="arena-team" class="arena-team-preview"></div>
            <div id="arena-master-info" style="display:none;margin:8px 0;padding:8px;background:#2a2a3e;border-radius:6px;"></div>
            <div id="arena-status"></div>
            <div class="arena-btns">
                <button class="btn-submit" id="arena-submit" onclick="submitArenaTeam()" disabled style="display:none;">Deposer mon equipe</button>
                <button class="btn-submit" id="arena-challenge" onclick="challengeArenaMaster()" disabled style="display:none;background:#e74c3c;">Defier le Maitre</button>
                <button class="btn-close" onclick="closeArenaModal()">Fermer</button>
            </div>
        </div>
    </div>

    <!-- PvP modal -->
    <div id="pvp-overlay">
        <div class="pvp-card">
            <h3>PvP - Le Trone</h3>
            <div id="pvp-ladder" class="pvp-ladder"><div style="color:#888;text-align:center;">Chargement...</div></div>
            <div id="pvp-target-info" style="display:none;"></div>
            <div class="pvp-warning">5 vs 6 Pokemon. Equipe adverse inconnue. IA intelligente. Bats celui au-dessus pour monter !</div>
            <div id="pvp-status"></div>
            <div class="pvp-btns">
                <button class="btn-pvp-go" id="pvp-challenge-btn" onclick="challengePvP()" disabled>Defier</button>
                <button class="btn-pvp-close" onclick="closePvPModal()">Fermer</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        console.log('[Pokemon] Version 44 - PvP defender from Supabase');

        // ============================================================
        // SUPABASE
        // ============================================================
        var SUPABASE_URL = 'https://oflklqvpqjrggacqypoa.supabase.co';
        var SUPABASE_KEY = 'sb_publishable_cTi55x7b89FizkL-cHwcAw_YCOEC4Xm';
        var _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        var _currentUser = null;

        // ============================================================
        // AUTH
        // ============================================================
        function showLogin() {
            document.getElementById('auth-login').style.display = '';
            document.getElementById('auth-register').style.display = 'none';
            document.getElementById('auth-error').textContent = '';
        }
        function showRegister() {
            document.getElementById('auth-login').style.display = 'none';
            document.getElementById('auth-register').style.display = '';
            document.getElementById('auth-error').textContent = '';
        }

        async function doLogin() {
            var pseudo = document.getElementById('login-pseudo').value.trim();
            var password = document.getElementById('login-password').value;
            if (!pseudo || !password) {
                document.getElementById('auth-error').textContent = 'Remplis tous les champs';
                return;
            }
            document.getElementById('login-btn').disabled = true;
            document.getElementById('auth-error').textContent = 'Connexion...';
            try {
                var res = await _sb.auth.signInWithPassword({
                    email: pseudo.toLowerCase() + '@pokemon.local',
                    password: password
                });
                if (res.error) {
                    document.getElementById('auth-error').textContent = 'Pseudo ou mot de passe incorrect';
                    document.getElementById('login-btn').disabled = false;
                    return;
                }
                _currentUser = res.data.user;
                onAuthSuccess(pseudo);
            } catch(e) {
                document.getElementById('auth-error').textContent = 'Erreur connexion';
                document.getElementById('login-btn').disabled = false;
            }
        }

        async function doRegister() {
            var pseudo = document.getElementById('reg-pseudo').value.trim();
            var password = document.getElementById('reg-password').value;
            var password2 = document.getElementById('reg-password2').value;
            if (!pseudo || !password) {
                document.getElementById('auth-error').textContent = 'Remplis tous les champs';
                return;
            }
            if (!/^[a-zA-Z0-9_]+$/.test(pseudo)) {
                document.getElementById('auth-error').textContent = 'Pseudo: lettres, chiffres et _ uniquement';
                return;
            }
            if (password.length < 6) {
                document.getElementById('auth-error').textContent = 'Mot de passe trop court (6 car. min)';
                return;
            }
            if (password !== password2) {
                document.getElementById('auth-error').textContent = 'Les mots de passe ne correspondent pas';
                return;
            }
            document.getElementById('reg-btn').disabled = true;
            document.getElementById('auth-error').textContent = 'Creation du compte...';
            try {
                var res = await _sb.auth.signUp({
                    email: pseudo.toLowerCase() + '@pokemon.local',
                    password: password,
                    options: { data: { pseudo: pseudo } }
                });
                if (res.error) {
                    var msg = 'Erreur: ' + res.error.message;
                    if (res.error.message.includes('already registered')) msg = 'Ce pseudo est deja pris';
                    document.getElementById('auth-error').textContent = msg;
                    document.getElementById('reg-btn').disabled = false;
                    return;
                }
                if (!res.data.session) {
                    document.getElementById('auth-error').textContent = 'Compte cree ! Connecte-toi maintenant.';
                    document.getElementById('reg-btn').disabled = false;
                    showLogin();
                    document.getElementById('login-pseudo').value = pseudo;
                    return;
                }
                _currentUser = res.data.user;
                onAuthSuccess(pseudo);
            } catch(e) {
                document.getElementById('auth-error').textContent = 'Erreur creation';
                document.getElementById('reg-btn').disabled = false;
            }
        }

        // Menu burger toggle
        function toggleMenu() {
            var btn = document.getElementById('menu-toggle');
            var dd = document.getElementById('menu-dropdown');
            btn.classList.toggle('open');
            dd.classList.toggle('open');
        }
        // Close menu when clicking outside
        document.addEventListener('click', function(e) {
            var bar = document.getElementById('top-bar');
            if (bar && !bar.contains(e.target)) {
                document.getElementById('menu-toggle').classList.remove('open');
                document.getElementById('menu-dropdown').classList.remove('open');
            }
        });

        // Per-user SRAM localStorage key
        function sramKey() {
            return _currentUser ? 'pokeemerald_sram_' + _currentUser.id : null;
        }

        function onAuthSuccess(pseudo) {
            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('top-bar').style.display = '';
            document.getElementById('user-display').textContent = pseudo;
            console.log('[Auth] Logged in as: ' + pseudo);
            restoreUserSRAM();
        }

        async function doLogout() {
            await _sb.auth.signOut();
            _currentUser = null;
            _sramInjected = false;
            location.reload();
        }

        // Auto-login from existing session
        (async function checkSession() {
            try {
                var res = await _sb.auth.getSession();
                if (res.data.session && res.data.session.user) {
                    _currentUser = res.data.session.user;
                    var pseudo = _currentUser.user_metadata && _currentUser.user_metadata.pseudo
                        ? _currentUser.user_metadata.pseudo
                        : _currentUser.email.split('@')[0];
                    onAuthSuccess(pseudo);
                }
            } catch(e) {
                console.warn('[Auth] Session check failed:', e);
            }
        })();

        // Enter key support
        document.getElementById('login-password').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doLogin();
        });
        document.getElementById('reg-password2').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doRegister();
        });

        // Persistent storage
        if (navigator.storage && navigator.storage.persist) {
            navigator.storage.persist().then(function(g) {
                console.log('[Save] Persistent storage:', g ? 'granted' : 'denied');
            });
        }

        // ============================================================
        // EMULATORJS CONFIG
        // ============================================================
        EJS_player = '#game-container';
        EJS_core = 'gba';
        EJS_gameUrl = 'rom/pokemon.gba?v=44';
        EJS_gameName = 'pokeemerald_custom';
        EJS_color = '#e94560';
        EJS_startOnLoaded = true;
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';

        // ============================================================
        // SRAM SYSTEM - Only save method, per-user, cloud-backed
        // ============================================================
        var _sramInjected = false;
        var _lastSramHash = '';

        // Restore SRAM for the logged-in user (cloud-only, no local cache)
        function restoreUserSRAM() {
            if (!_currentUser) return;

            console.log('[SRAM] Fetching save from cloud...');
            _sb.from('saves')
                .select('save_data')
                .eq('user_id', _currentUser.id)
                .eq('slot_name', '__sram__')
                .single().then(function(res) {
                    if (res.data && res.data.save_data) {
                        console.log('[SRAM] Cloud save found, injecting...');
                        tryInjectSRAM(res.data.save_data);
                    } else {
                        console.log('[SRAM] No cloud save - new player');
                    }
                }).catch(function(err) {
                    console.warn('[SRAM] Cloud fetch failed:', err);
                });
        }

        // Wait for emulator then inject
        function tryInjectSRAM(b64) {
            if (_sramInjected) return;
            if (!window.EJS_emulator || !window.EJS_emulator.gameManager) {
                setTimeout(function() { tryInjectSRAM(b64); }, 1000);
                return;
            }
            setTimeout(function() {
                var ok = injectSRAM(b64);
                if (ok) {
                    _sramInjected = true;
                    toast('Sauvegarde restauree !');
                }
            }, 2000);
        }

        // Write SRAM into emulator FS, reload into core, restart game
        function injectSRAM(b64) {
            try {
                var bin = atob(b64);
                var bytes = new Uint8Array(bin.length);
                for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);

                var gm = window.EJS_emulator.gameManager;

                // Get the exact path the core expects
                var savePath = null;
                if (typeof gm.getSaveFilePath === 'function') {
                    savePath = gm.getSaveFilePath();
                }
                if (!savePath) {
                    savePath = '/data/saves/' + (EJS_gameName || 'pokemon') + '.srm';
                }
                console.log('[SRAM] Save path: ' + savePath);

                // Write to FS
                var FS = gm.FS || (gm.Module && gm.Module.FS);
                if (!FS) { console.warn('[SRAM] No FS'); return false; }
                FS.writeFile(savePath, bytes);
                console.log('[SRAM] Written ' + bytes.length + 'B');

                // Tell core to re-read SRAM from FS
                if (typeof gm.loadSaveFiles === 'function') gm.loadSaveFiles();

                // Restart game so it sees the SRAM
                if (typeof gm.restart === 'function') gm.restart();

                console.log('[SRAM] Injected + restarted');
                return true;
            } catch(e) {
                console.warn('[SRAM] Injection failed:', e);
                return false;
            }
        }

        // Hash to detect SRAM changes
        function hashBytes(data) {
            var h = 0;
            for (var i = 0; i < data.length; i += 64) {
                h = ((h << 5) - h + data[i]) | 0;
            }
            return h.toString();
        }

        function countNonEmpty(data) {
            var count = 0;
            for (var i = 0; i < data.length; i += 16) {
                if (data[i] !== 0 && data[i] !== 0xFF) count++;
            }
            return count;
        }

        // Backup SRAM to localStorage + cloud (called every 10s)
        function backupSRAM() {
            try {
                if (!_currentUser) return;
                var gm = window.EJS_emulator.gameManager;
                gm.saveSaveFiles();
                var sav = gm.getSaveFile();
                if (!sav || sav.length === 0) return;

                var hash = hashBytes(sav);
                if (hash === _lastSramHash) return;
                _lastSramHash = hash;

                var nonEmpty = countNonEmpty(sav);
                if (nonEmpty < 5) return; // Blank save

                var bin = '';
                for (var i = 0; i < sav.length; i++) bin += String.fromCharCode(sav[i]);
                var b64 = btoa(bin);

                console.log('[SRAM] Backup OK (' + sav.length + 'B, ' + nonEmpty + ' sectors)');

                // Extract player profile for stats
                var profile = null;
                try {
                    profile = SRAMParser.extractProfile(sav);
                } catch(pe) {
                    console.warn('[SRAM] Profile extraction failed:', pe.message);
                }

                // Upload save to Supabase
                _sb.from('saves').upsert({
                    user_id: _currentUser.id,
                    slot_name: '__sram__',
                    save_data: b64,
                    save_type: 'sram',
                    updated_at: new Date().toISOString()
                }, { onConflict: 'user_id,slot_name' }).then(function(res) {
                    if (res.error) {
                        console.warn('[SRAM] Cloud failed:', res.error.message);
                        toast('Erreur sauvegarde cloud !', true);
                    } else {
                        console.log('[SRAM] Cloud OK');
                        toast('Sauvegarde reussie !');
                    }
                });

                // Upload profile to Supabase (non-blocking)
                if (profile) {
                    var pseudo = _currentUser.user_metadata && _currentUser.user_metadata.pseudo
                        ? _currentUser.user_metadata.pseudo
                        : _currentUser.email.split('@')[0];
                    _sb.from('player_profiles').upsert({
                        user_id: _currentUser.id,
                        pseudo: pseudo,
                        profile: profile,
                        updated_at: new Date().toISOString()
                    }, { onConflict: 'user_id' }).then(function(res) {
                        if (res.error) console.warn('[Profile] Update failed:', res.error.message);
                    });
                }
            } catch(e) {}
        }

        // Wait for emulator ready
        var _waitReady = setInterval(function() {
            try {
                if (window.EJS_emulator && window.EJS_emulator.gameManager) {
                    clearInterval(_waitReady);
                    console.log('[Save] Emulator ready');

                    // If already logged in, restore SRAM

                    setTimeout(function() {

                    }, 5000);
                }
            } catch(e) {}
        }, 1000);

        document.addEventListener('visibilitychange', function() {

        // Check if a Pokemon has a given type
        function pokemonHasType(speciesId, typeId) {
            if (!_speciesTypes) return true; // fallback: allow all if types not loaded
            var types = _speciesTypes[speciesId];
            if (!types) return false;
            return types.indexOf(typeId) !== -1;

                var item = p.heldItem > 0 && _itemsNames ? (_itemsNames[p.heldItem] || '') : '';
                var matchesType = gymTypeId === null || pokemonHasType(p.species, gymTypeId);

        async function submitArenaTeam() {

        async function challengeArenaMaster() {
            var gymId = document.getElementById('arena-gym').value;
            if (!gymId || !_arenaMaster || !_currentUser) return;

            var gym = ARENA_GYMS[gymId];
            if (!gym) return;

            document.getElementById('arena-challenge').disabled = true;
            setArenaStatus('Preparation du combat...', false);

            try {
                // Step 1: Save current game state
                var gm = window.EJS_emulator && window.EJS_emulator.gameManager;
                if (!gm) {
                    setArenaStatus('Emulateur non pret', true);
                    return;
                }
                gm.saveSaveFiles();
                var sram = gm.getSaveFile();
                if (!sram || sram.length < 131072) {
                    setArenaStatus('Sauvegarde introuvable', true);
                    return;
                }

                // Step 2: Build the master's team for BattleTowerPokemon format
                var masterTeam = _arenaMaster.team || [];
                if (masterTeam.length === 0) {
                    setArenaStatus('L\'equipe du maitre est vide !', true);
                    return;
                }

                // Step 3: Write arena mailbox to SRAM sector 30
                var sramCopy = new Uint8Array(sram);
                SRAMParser.writeArenaMailbox(sramCopy, {
                    gymId: gym.badge, // gym index 0-7 matches badge index
                    party: masterTeam,
                });

                // Step 4: Inject modified SRAM and restart
                var b64 = '';
                var CHUNK = 8192;
                for (var i = 0; i < sramCopy.length; i += CHUNK) {
                    var slice = sramCopy.subarray(i, Math.min(i + CHUNK, sramCopy.length));
                    for (var j = 0; j < slice.length; j++) b64 += String.fromCharCode(slice[j]);
                }
                b64 = btoa(b64);

                setArenaStatus('Lancement du combat... Appuie sur Continuer dans le jeu !', false);
                closeArenaModal();
                toast('Combat Arena lance ! Appuie sur Continuer');

                injectSRAM(b64);

                // Step 5: Start polling for result
                startArenaPolling(gymId);

            } catch(e) {
                console.error('[Arena] Challenge error:', e);
                setArenaStatus('Erreur: ' + e.message, true);
                document.getElementById('arena-challenge').disabled = false;
            }
        }

        function startArenaPolling(gymId) {
            if (_arenaPollingId) clearInterval(_arenaPollingId);

            var pollCount = 0;
            var maxPolls = 200; // ~10 min at 3s interval

            _arenaPollingId = setInterval(function() {
                pollCount++;
                if (pollCount > maxPolls) {
                    clearInterval(_arenaPollingId);
                    _arenaPollingId = null;
                    console.log('[Arena] Polling timeout');
                    return;
                }

                try {
                    var gm = window.EJS_emulator && window.EJS_emulator.gameManager;
                    if (!gm) return;
                    gm.saveSaveFiles();
                    var sram = gm.getSaveFile();
                    if (!sram || sram.length < 131072) return;

                    var result = SRAMParser.readArenaResult(sram);
                    if (!result.valid) return;

                    // Still active = battle not finished yet
                    if (result.active) return;

                    // Battle is done! Check result
                    if (result.result === 1) {
                        // WIN
                        handleArenaWin(gymId);
                    } else if (result.result === 2) {
                        // LOSS
                        handleArenaLoss(gymId);
                    }

                    // Clear polling
                    clearInterval(_arenaPollingId);
                    _arenaPollingId = null;

                    // Clear the mailbox in SRAM
                    SRAMParser.clearArenaMailbox(sram);

                    // Force immediate cloud backup so result persists
                    try { backupSRAM(); } catch(bk) {}

                } catch(e) {
                    console.warn('[Arena] Poll error:', e);
                }
            }, 3000);
        }

                var pseudo = _currentUser.user_metadata && _currentUser.user_metadata.pseudo
                    ? _currentUser.user_metadata.pseudo
                    : _currentUser.email.split('@')[0];

                var team = filtered.map(function(p) {
                    return {
                        species: p.species,
                        speciesName: (_speciesNames && _speciesNames[p.species]) || p.nickname,
                        heldItem: p.heldItem,
                        itemName: p.heldItem > 0 && _itemsNames ? (_itemsNames[p.heldItem] || null) : null,
                        level: p.level,
                        moves: p.moves.map(function(m) {
                            return { id: m, name: _movesNames ? (_movesNames[m] || '???') : '???' };
                        }),
                        movesRaw: p.movesRaw || p.moves.concat([0,0,0,0]).slice(0,4),
                        hp: p.maxHP, attack: p.attack, defense: p.defense,
                        speed: p.speed, spAttack: p.spAttack, spDefense: p.spDefense,
                        evs: p.evs,
                        ivs: p.ivs,
                        personality: p.personality,
                        otId: p.otId,
                        ppBonuses: p.ppBonuses || 0,
                        abilityNum: p.abilityNum || 0,
                        friendship: p.friendship || 0,
                        nickname: p.nickname || '',
                    };
                });

                // Increment old master's losses
                await _sb.from('arena_masters')
                    .update({ losses: (_arenaMaster && _arenaMaster.losses || 0) + 1 })
                    .eq('gym_id', gymId);

                // Replace with new master
                await _sb.from('arena_masters').upsert({
                    gym_id: gymId,
                    master_pseudo: pseudo,
                    master_user_id: _currentUser.id,
                    team: team,
                    wins: 0,
                    losses: 0,
                    updated_at: new Date().toISOString()
                }, { onConflict: 'gym_id' });

        async function handleArenaLoss(gymId) {

        async function loadPvPLadder() {
            try {
                var res = await _sb.from('player_profiles').select('*');
                if (res.error) throw res.error;
                var players = res.data || [];

                if (players.length === 0) {
                    document.getElementById('pvp-ladder').innerHTML = '<div style="color:#888;text-align:center;">Aucun joueur inscrit</div>';
                    return;
                }

                // Auto-assign ranks to players who don't have one
                var maxRank = 0;
                var needsRank = [];
                for (var i = 0; i < players.length; i++) {
                    if (players[i].pvp_rank != null && players[i].pvp_rank > 0) {
                        if (players[i].pvp_rank > maxRank) maxRank = players[i].pvp_rank;
                    } else {
                        needsRank.push(players[i]);
                    }
                }
                for (var i = 0; i < needsRank.length; i++) {
                    maxRank++;
                    needsRank[i].pvp_rank = maxRank;
                    // Save rank to DB
                    await _sb.from('player_profiles').update({ pvp_rank: maxRank }).eq('user_id', needsRank[i].user_id);
                }

                // Sort by rank
                players.sort(function(a, b) { return (a.pvp_rank || 999) - (b.pvp_rank || 999); });
                _pvpAllPlayers = players;

                // Find myself and my target
                _pvpMyRank = null;
                _pvpTarget = null;
                for (var i = 0; i < players.length; i++) {
                    if (players[i].user_id === _currentUser.id) {
                        _pvpMyRank = players[i].pvp_rank;
                        // Target = player directly above (index i-1)
                        if (i > 0) {
                            _pvpTarget = players[i - 1];
                        }
                        break;
                    }
                }

                renderPvPLadder();

            } catch(e) {
                console.error('[PvP] Load ladder error:', e);
                document.getElementById('pvp-ladder').innerHTML = '<div style="color:#ff5555;text-align:center;">Erreur chargement</div>';
            }
        }

        function renderPvPLadder() {
            var ladderEl = document.getElementById('pvp-ladder');
            var btn = document.getElementById('pvp-challenge-btn');
            var targetInfo = document.getElementById('pvp-target-info');

            var html = '';
            for (var i = 0; i < _pvpAllPlayers.length; i++) {
                var p = _pvpAllPlayers[i];
                var profile = p.profile || {};
                var party = profile.party || [];
                var avgLv = 0;
                if (party.length > 0) {
                    var sum = 0;
                    for (var j = 0; j < party.length; j++) sum += (party[j].level || 0);
                    avgLv = Math.round(sum / party.length);
                }
                var badges = profile.badges || [];
                var badgeCount = badges.filter(function(b){ return b; }).length;

                var isMe = p.user_id === _currentUser.id;
                var isTarget = _pvpTarget && p.user_id === _pvpTarget.user_id;
                var rankClass = p.pvp_rank === 1 ? 'gold' : p.pvp_rank === 2 ? 'silver' : p.pvp_rank === 3 ? 'bronze' : '';
                var rowClass = isMe ? 'is-me' : isTarget ? 'is-target' : '';
                var pseudoClass = isMe ? 'me' : isTarget ? 'target' : '';
                var crown = p.pvp_rank === 1 ? '&#128081; ' : '';
                var youTag = isMe ? ' (TOI)' : '';
                var targetTag = isTarget ? ' &#8592; Cible' : '';

                html += '<div class="pvp-row ' + rowClass + '">' +
                    '<span class="pvp-rank ' + rankClass + '">' + p.pvp_rank + '</span>' +
                    '<span class="pvp-pseudo ' + pseudoClass + '">' + crown + (p.pseudo || '???') + youTag + '</span>' +
                    '<span class="pvp-meta">' + badgeCount + 'B | Nv.' + avgLv + targetTag + '</span>' +
                    '</div>';
            }
            ladderEl.innerHTML = html;

            // Target info + button
            if (_pvpMyRank === 1) {
                targetInfo.style.display = 'block';
                targetInfo.innerHTML = '<div style="color:#ffd700;font-weight:bold;padding:8px;background:rgba(255,215,0,0.1);border-radius:6px;margin:8px 0;">&#128081; Tu es au sommet du Trone ! Defends ta place.</div>';
                btn.disabled = true;
                btn.textContent = 'Tu es #1 !';
            } else if (_pvpTarget) {
                targetInfo.style.display = 'block';
                targetInfo.innerHTML = '<div style="color:#ff9800;padding:8px;background:rgba(243,156,18,0.1);border-radius:6px;margin:8px 0;">Tu es <b>#' + _pvpMyRank + '</b>. Bats <b style="color:#ff5555;">' + (_pvpTarget.pseudo || '???') + '</b> (#' + _pvpTarget.pvp_rank + ') pour monter !</div>';
                btn.disabled = false;
                btn.textContent = 'Defier ' + (_pvpTarget.pseudo || '???');
            } else {
                targetInfo.style.display = 'none';
                btn.disabled = true;
                btn.textContent = 'Defier';
            }
        }

        async function challengePvP() {
            if (!_pvpTarget || !_currentUser) return;

            var defender = _pvpTarget;
            var defenderProfile = defender.profile || {};
            var defenderParty = defenderProfile.party || [];

            if (defenderParty.length === 0) {
                setPvPStatus('Ce joueur n\'a pas de Pokemon !', true);
                return;
            }

            // Save defender party from Supabase for post-battle recording
            _pvpDefenderParty = defenderParty.map(function(p) {
                return { species: p.species, nickname: p.nickname || '', level: p.level || 0, maxHp: p.maxHP || p.maxHp || 0 };
            });

            document.getElementById('pvp-challenge-btn').disabled = true;
            setPvPStatus('Preparation du combat...', false);

            try {
                var gm = window.EJS_emulator && window.EJS_emulator.gameManager;
                if (!gm) {
                    setPvPStatus('Emulateur non pret', true);
                    return;
                }
                gm.saveSaveFiles();
                var sram = gm.getSaveFile();
                if (!sram || sram.length < 131072) {
                    setPvPStatus('Sauvegarde introuvable', true);
                    return;
                }

                // Build defender team for BTP format
                var team = defenderParty.map(function(p) {
                    return {
                        species: p.species,
                        heldItem: p.heldItem || 0,
                        level: p.level || 5,
                        moves: p.moves || [0, 0, 0, 0],
                        evs: p.evs || [0, 0, 0, 0, 0, 0],
                        ivs: p.ivs || { hp: 0, atk: 0, def: 0, spa: 0, spd: 0, spe: 0 },
                        personality: p.personality || 0,
                        otId: p.otId || 0,
                        ppBonuses: p.ppBonuses || 0,
                        friendship: p.friendship || 0,
                        nickname: p.nickname || '',
                    };
                });

                // Write mailbox with gymId=0xFF (PvP)
                var sramCopy = new Uint8Array(sram);
                SRAMParser.writeArenaMailbox(sramCopy, {
                    gymId: 0xFF,
                    party: team,
                });

                // Inject modified SRAM and restart
                var b64 = '';
                var CHUNK = 8192;
                for (var i = 0; i < sramCopy.length; i += CHUNK) {
                    var slice = sramCopy.subarray(i, Math.min(i + CHUNK, sramCopy.length));
                    for (var j = 0; j < slice.length; j++) b64 += String.fromCharCode(slice[j]);
                }
                b64 = btoa(b64);

                setPvPStatus('Lancement du combat... Appuie sur Continuer !', false);
                closePvPModal();
                toast('Combat PvP lance ! Appuie sur Continuer');

                injectSRAM(b64);

                // Start polling with rank info for swap
                startPvPPolling(defender.user_id, defender.pseudo || '???', defender.pvp_rank, _pvpMyRank);

            } catch(e) {
                console.error('[PvP] Challenge error:', e);
                setPvPStatus('Erreur: ' + e.message, true);
                document.getElementById('pvp-challenge-btn').disabled = false;
            }
        }

        function startPvPPolling(defenderId, defenderPseudo, defenderRank, myRank) {
            if (_pvpPollingId) clearInterval(_pvpPollingId);

            var pollCount = 0;
            var maxPolls = 200;

            _pvpPollingId = setInterval(function() {
                pollCount++;
                if (pollCount > maxPolls) {
                    clearInterval(_pvpPollingId);
                    _pvpPollingId = null;
                    console.log('[PvP] Polling timeout');
                    return;
                }

                try {
                    var gm = window.EJS_emulator && window.EJS_emulator.gameManager;
                    if (!gm) return;
                    gm.saveSaveFiles();
                    var sram = gm.getSaveFile();
                    if (!sram || sram.length < 131072) return;

                    var result = SRAMParser.readArenaResult(sram);
                    if (!result.valid) return;
                    if (result.active) return;

                    // Battle done
                    var winner = result.result === 1 ? 'challenger' : 'defender';
                    // Challenger team from ROM (gPlayerParty is valid post-battle)
                    // Defender team from Supabase profile (ROM data is unreliable)
                    handlePvPResult(defenderId, defenderPseudo, winner,
                        result.challengerRemaining || 0, result.defenderRemaining || 0,
                        defenderRank, myRank,
                        result.challengerMons || [], _pvpDefenderParty,
                        result.challengerTeamSize || 0, _pvpDefenderParty.length);

                    clearInterval(_pvpPollingId);
                    _pvpPollingId = null;

                    SRAMParser.clearArenaMailbox(sram);

                    // Force immediate cloud backup so result persists
                    try { backupSRAM(); } catch(bk) {}

                } catch(e) {
                    console.warn('[PvP] Poll error:', e);
                }
            }, 3000);
        }

        async function handlePvPResult(defenderId, defenderPseudo, winner, challengerRemaining, defenderRemaining, defenderRank, myRank, challengerMons, defenderMons, challengerTeamSize, defenderTeamSize) {
            var pseudo = _currentUser.user_metadata && _currentUser.user_metadata.pseudo
                ? _currentUser.user_metadata.pseudo
                : _currentUser.email.split('@')[0];

            if (winner === 'challenger') {
                toast('Victoire ! Tu passes #' + defenderRank + ' !');
                try {
                    await _sb.from('player_profiles').update({ pvp_rank: defenderRank }).eq('user_id', _currentUser.id);
                    await _sb.from('player_profiles').update({ pvp_rank: myRank }).eq('user_id', defenderId);
                    console.log('[PvP] Ranks swapped:', pseudo, defenderRank, '<->', defenderPseudo, myRank);
                } catch(e) {
                    console.error('[PvP] Rank swap error:', e);
                }
            } else {
                toast('Defaite... Tu restes #' + myRank);
            }

            try {
                await _sb.from('pvp_matches').insert({
                    challenger_id: _currentUser.id,
                    challenger_pseudo: pseudo,
                    defender_id: defenderId,
                    defender_pseudo: defenderPseudo,
                    winner: winner,
                    challenger_remaining: challengerRemaining,
                    defender_remaining: defenderRemaining,
                    challenger_team: challengerMons || [],
                    defender_team: defenderMons || [],
                });
                console.log('[PvP] Match recorded:', pseudo, 'vs', defenderPseudo, '->', winner,
                    'C:', challengerRemaining, '/', challengerTeamSize,
                    'D:', defenderRemaining, '/', defenderTeamSize,
                    'CMons:', JSON.stringify(challengerMons),
                    'DMons:', JSON.stringify(defenderMons));
            } catch(e) {
                console.error('[PvP] Record match error:', e);
            }
        }
    </script>
