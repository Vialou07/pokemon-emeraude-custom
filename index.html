<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pokemon Emeraude Custom</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        body {
            background: #1a1a2e;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 100vh; min-height: 100dvh;
            font-family: 'Segoe UI', sans-serif; color: white;
            overflow: hidden; -webkit-user-select: none; user-select: none;
        }
        h1 { font-size: 1.2rem; margin: 8px 0; text-align: center; color: #e94560; }
        #game-container {
            position: relative; width: 100vw;
            height: calc(100vh - 40px); height: calc(100dvh - 40px);
            max-width: 800px; max-height: 600px;
        }
        @media (max-width: 768px) {
            #game-container { width: 100vw; height: 100vh; height: 100dvh; max-width: none; max-height: none; }
            h1 { display: none; }
        }

        /* Top bar buttons */
        #save-bar {
            position: fixed; top: 6px; right: 6px; z-index: 10001;
            display: flex; gap: 5px;
        }
        #save-bar button {
            background: rgba(233, 69, 96, 0.85); color: white; border: none;
            border-radius: 8px; padding: 8px 14px; font-size: 0.8rem; font-weight: bold;
            cursor: pointer; touch-action: manipulation; backdrop-filter: blur(4px);
        }
        #save-bar button:active { opacity: 0.6; }
        #save-bar button.green { background: rgba(0, 180, 80, 0.85); }

        /* Modal overlay */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 20000;
            align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #16213e; border: 2px solid #e94560; border-radius: 16px;
            padding: 20px; min-width: 300px; max-width: 90vw; max-height: 80vh;
            overflow-y: auto;
        }
        .modal h2 {
            color: #e94560; font-size: 1.1rem; margin-bottom: 14px; text-align: center;
        }
        .modal .slot {
            background: #1a1a2e; border: 1px solid #333; border-radius: 10px;
            padding: 12px 14px; margin-bottom: 8px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            transition: border-color 0.2s;
        }
        .modal .slot:hover, .modal .slot:active { border-color: #e94560; }
        .modal .slot .name { font-weight: bold; font-size: 0.95rem; }
        .modal .slot .info { font-size: 0.7rem; color: #888; margin-top: 2px; }
        .modal .slot .actions { display: flex; gap: 6px; }
        .modal .slot .actions button {
            background: #e94560; color: white; border: none; border-radius: 6px;
            padding: 5px 10px; font-size: 0.7rem; cursor: pointer;
        }
        .modal .slot .actions button.del { background: #555; }
        .modal .slot .actions button.exp { background: #3366cc; }
        .modal .new-save {
            background: rgba(0, 180, 80, 0.2); border: 2px dashed rgba(0, 180, 80, 0.6);
            border-radius: 10px; padding: 14px; text-align: center; cursor: pointer;
            color: #0f8; font-weight: bold; font-size: 0.9rem; margin-top: 4px;
        }
        .modal .new-save:hover { background: rgba(0, 180, 80, 0.3); }
        .modal .import-btn {
            background: rgba(100, 100, 255, 0.2); border: 2px dashed rgba(100, 100, 255, 0.6);
            border-radius: 10px; padding: 14px; text-align: center; cursor: pointer;
            color: #aaf; font-weight: bold; font-size: 0.9rem; margin-top: 4px;
        }
        .modal .import-btn:hover { background: rgba(100, 100, 255, 0.3); }
        .modal .cancel {
            display: block; margin: 14px auto 0; background: #333; color: #aaa;
            border: none; border-radius: 8px; padding: 8px 20px; cursor: pointer;
            font-size: 0.85rem;
        }
        .modal .empty-msg {
            color: #666; text-align: center; padding: 20px 0; font-size: 0.85rem;
        }

        /* Name input dialog */
        .name-dialog {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 30000;
            align-items: center; justify-content: center;
        }
        .name-dialog.open { display: flex; }
        .name-dialog .box {
            background: #16213e; border: 2px solid #0f8; border-radius: 16px;
            padding: 20px; text-align: center; min-width: 280px;
        }
        .name-dialog .box p { margin-bottom: 12px; font-size: 0.9rem; }
        .name-dialog .box input {
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #555;
            background: #1a1a2e; color: white; font-size: 1rem; text-align: center;
            outline: none;
        }
        .name-dialog .box input:focus { border-color: #0f8; }
        .name-dialog .box .btns { margin-top: 12px; display: flex; gap: 8px; justify-content: center; }
        .name-dialog .box .btns button {
            padding: 8px 18px; border: none; border-radius: 8px; cursor: pointer;
            font-weight: bold; font-size: 0.85rem;
        }
        .name-dialog .box .btns .ok { background: #0f8; color: #111; }
        .name-dialog .box .btns .no { background: #555; color: #aaa; }

        /* Toast */
        #toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 200, 83, 0.9); color: white;
            padding: 10px 24px; border-radius: 20px;
            font-size: 0.85rem; font-weight: bold;
            z-index: 40000; pointer-events: none;
            opacity: 0; transition: opacity 0.3s ease;
        }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>
    <h1>Pokemon Emeraude Custom</h1>
    <div id="game-container"></div>

    <div id="save-bar">
        <button class="green" onclick="openSaveModal()">Sauver</button>
        <button onclick="openLoadModal()">Charger</button>
    </div>

    <!-- Save modal -->
    <div class="modal-overlay" id="save-modal">
        <div class="modal">
            <h2>Sauvegarder</h2>
            <div id="save-slots"></div>
            <div class="new-save" onclick="promptNewSave()">+ Nouvelle sauvegarde</div>
            <button class="cancel" onclick="closeModals()">Annuler</button>
        </div>
    </div>

    <!-- Load modal -->
    <div class="modal-overlay" id="load-modal">
        <div class="modal">
            <h2>Charger une sauvegarde</h2>
            <div id="load-slots"></div>
            <div class="import-btn" onclick="document.getElementById('import-file').click()">
                Importer un fichier .state
            </div>
            <input type="file" id="import-file" accept=".state,.sav,.srm" style="display:none" onchange="importFile(this)">
            <button class="cancel" onclick="closeModals()">Annuler</button>
        </div>
    </div>

    <!-- Name input dialog -->
    <div class="name-dialog" id="name-dialog">
        <div class="box">
            <p id="name-dialog-text">Nom de la sauvegarde :</p>
            <input type="text" id="name-input" placeholder="Ex: aventure1" maxlength="30">
            <div class="btns">
                <button class="ok" onclick="confirmName()">OK</button>
                <button class="no" onclick="cancelName()">Annuler</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        console.log('[Pokemon] Version 10 - SRAM polling + save states');

        // Persistent storage
        if (navigator.storage && navigator.storage.persist) {
            navigator.storage.persist().then(function(g) {
                console.log('[Save] Persistent storage:', g ? 'granted' : 'denied');
            });
        }

        // EmulatorJS config
        EJS_player = '#game-container';
        EJS_core = 'gba';
        EJS_gameUrl = 'rom/pokemon.gba';
        EJS_gameName = 'pokeemerald_custom';
        EJS_color = '#e94560';
        EJS_startOnLoaded = true;
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';

        // Intercept EmulatorJS save/load buttons -> our system
        EJS_onSaveState = function(data) { openSaveModal(); };
        EJS_onLoadState = function() { openLoadModal(); };

        // SRAM RESTORE: if we have a backup in localStorage, feed it to mGBA at init
        (function() {
            var b64 = localStorage.getItem('pokeemerald_sram');
            if (b64) {
                try {
                    var bin = atob(b64);
                    var bytes = new Uint8Array(bin.length);
                    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
                    var blob = new Blob([bytes], { type: 'application/octet-stream' });
                    EJS_gameSaveUrl = URL.createObjectURL(blob);
                    console.log('[SRAM] Restored from localStorage (' + bytes.length + 'B) -> EJS_gameSaveUrl');
                } catch(e) {
                    console.warn('[SRAM] Restore failed:', e);
                }
            }
        })();

        // Detect when the game writes SRAM (in-game save from Pokemon menu)
        EJS_onSaveUpdate = function(data) {
            if (data && data.save && data.save.length > 0) {
                console.log('[SRAM] EJS_onSaveUpdate fired! Size: ' + data.save.length + 'B');
                // Backup SRAM to localStorage
                var bin = '';
                for (var i = 0; i < data.save.length; i++) bin += String.fromCharCode(data.save[i]);
                localStorage.setItem('pokeemerald_sram', btoa(bin));
                console.log('[SRAM] Backed up to localStorage');
                toast('Sauvegarde Pokemon OK !');
            }
        };

        // ============================================================
        // SAVE MANAGER - Named slots in IndexedDB + file download
        // ============================================================
        var DB_NAME = 'PokemonSaves';
        var DB_STORE = 'states';
        var REGISTRY_KEY = 'pokemon_save_registry';

        // Auto-save only runs AFTER the player has saved or loaded manually
        // Prevents overwriting real saves with intro/title screen states
        var _sessionActive = false;

        // Registry: [{name, date, size}] stored in localStorage
        function getRegistry() {
            try {
                return JSON.parse(localStorage.getItem(REGISTRY_KEY)) || [];
            } catch(e) { return []; }
        }
        function setRegistry(reg) {
            localStorage.setItem(REGISTRY_KEY, JSON.stringify(reg));
        }

        // IndexedDB helpers
        function openDB() {
            return new Promise(function(resolve, reject) {
                var req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = function(e) {
                    e.target.result.createObjectStore(DB_STORE);
                };
                req.onsuccess = function(e) { resolve(e.target.result); };
                req.onerror = function(e) { reject(e); };
            });
        }
        function dbPut(key, data) {
            return openDB().then(function(db) {
                return new Promise(function(resolve, reject) {
                    var tx = db.transaction(DB_STORE, 'readwrite');
                    tx.objectStore(DB_STORE).put(data, key);
                    tx.oncomplete = function() { resolve(); };
                    tx.onerror = function(e) { reject(e); };
                });
            });
        }
        function dbGet(key) {
            return openDB().then(function(db) {
                return new Promise(function(resolve, reject) {
                    var tx = db.transaction(DB_STORE, 'readonly');
                    var req = tx.objectStore(DB_STORE).get(key);
                    req.onsuccess = function() { resolve(req.result); };
                    req.onerror = function(e) { reject(e); };
                });
            });
        }
        function dbDelete(key) {
            return openDB().then(function(db) {
                return new Promise(function(resolve, reject) {
                    var tx = db.transaction(DB_STORE, 'readwrite');
                    tx.objectStore(DB_STORE).delete(key);
                    tx.oncomplete = function() { resolve(); };
                    tx.onerror = function(e) { reject(e); };
                });
            });
        }

        // ============================================================
        // SAVE MODAL
        // ============================================================
        function openSaveModal() {
            var reg = getRegistry();
            var container = document.getElementById('save-slots');
            container.innerHTML = '';
            if (reg.length === 0) {
                container.innerHTML = '<div class="empty-msg">Aucune sauvegarde existante</div>';
            } else {
                for (var i = 0; i < reg.length; i++) {
                    (function(slot) {
                        var div = document.createElement('div');
                        div.className = 'slot';
                        var displayName = slot.name === '__autosave' ? 'Auto-save' : slot.name;
                        div.innerHTML =
                            '<div>' +
                                '<div class="name">' + escHtml(displayName) + '</div>' +
                                '<div class="info">' + slot.date + ' - ' + formatSize(slot.size) + '</div>' +
                            '</div>' +
                            '<div class="actions">' +
                                '<button class="overwrite">Ecraser</button>' +
                                '<button class="exp">DL</button>' +
                                '<button class="del">X</button>' +
                            '</div>';
                        div.querySelector('.overwrite').onclick = function(e) {
                            e.stopPropagation();
                            overwriteSave(slot.name);
                        };
                        div.querySelector('.exp').onclick = function(e) {
                            e.stopPropagation();
                            exportSave(slot.name);
                        };
                        div.querySelector('.del').onclick = function(e) {
                            e.stopPropagation();
                            deleteSave(slot.name);
                        };
                        container.appendChild(div);
                    })(reg[i]);
                }
            }
            document.getElementById('save-modal').classList.add('open');
        }

        function overwriteSave(name) {
            closeModals();
            doSave(name);
        }

        function promptNewSave() {
            closeModals();
            _nameCallback = function(name) {
                if (name) doSave(name);
            };
            document.getElementById('name-dialog-text').textContent = 'Nom de la sauvegarde :';
            document.getElementById('name-input').value = '';
            document.getElementById('name-dialog').classList.add('open');
            setTimeout(function() { document.getElementById('name-input').focus(); }, 100);
        }

        function doSave(name) {
            try {
                var gm = window.EJS_emulator.gameManager;
                var state = gm.getState();
                if (!state || state.length === 0) {
                    toast('Jeu pas encore pret', true);
                    return;
                }

                // Save to IndexedDB (no file download - use Export button for that)
                dbPut('state_' + name, state).then(function() {
                    console.log('[Save] "' + name + '" saved to IndexedDB (' + state.length + 'B)');
                }).catch(function(e) {
                    console.warn('[Save] IndexedDB error:', e);
                });

                // Update registry
                var reg = getRegistry();
                var found = false;
                var now = new Date();
                var dateStr = now.toLocaleDateString('fr-FR') + ' ' + now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
                for (var i = 0; i < reg.length; i++) {
                    if (reg[i].name === name) {
                        reg[i].date = dateStr;
                        reg[i].size = state.length;
                        found = true;
                        break;
                    }
                }
                if (!found) {
                    reg.push({ name: name, date: dateStr, size: state.length });
                }
                setRegistry(reg);
                _sessionActive = true;
                toast('"' + name + '" sauvegardee !');
            } catch(e) {
                console.error('[Save] Save error:', e);
                toast('Erreur: ' + e.message, true);
            }
        }

        function exportSave(name) {
            dbGet('state_' + name).then(function(state) {
                if (state) {
                    var blob = new Blob([state], { type: 'application/octet-stream' });
                    var a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = name + '.state';
                    a.click();
                    URL.revokeObjectURL(a.href);
                    toast('"' + name + '" exportee !');
                } else {
                    toast('Save introuvable', true);
                }
            });
        }

        function deleteSave(name) {
            dbDelete('state_' + name).catch(function() {});
            var reg = getRegistry().filter(function(s) { return s.name !== name; });
            setRegistry(reg);
            toast('"' + name + '" supprimee');
            openSaveModal(); // Refresh list
        }

        // ============================================================
        // LOAD MODAL
        // ============================================================
        function openLoadModal() {
            var reg = getRegistry();
            var container = document.getElementById('load-slots');
            container.innerHTML = '';
            if (reg.length === 0) {
                container.innerHTML = '<div class="empty-msg">Aucune sauvegarde.<br>Utilisez "Importer" pour charger un fichier .state</div>';
            } else {
                for (var i = 0; i < reg.length; i++) {
                    (function(slot) {
                        var div = document.createElement('div');
                        div.className = 'slot';
                        var displayName = slot.name === '__autosave' ? 'Auto-save' : slot.name;
                        div.innerHTML =
                            '<div>' +
                                '<div class="name">' + escHtml(displayName) + '</div>' +
                                '<div class="info">' + slot.date + ' - ' + formatSize(slot.size) + '</div>' +
                            '</div>';
                        div.onclick = function() {
                            closeModals();
                            loadSave(slot.name);
                        };
                        container.appendChild(div);
                    })(reg[i]);
                }
            }
            document.getElementById('load-modal').classList.add('open');
        }

        function loadSave(name) {
            dbGet('state_' + name).then(function(state) {
                if (state) {
                    window.EJS_emulator.gameManager.loadState(new Uint8Array(state));
                    _sessionActive = true;
                    console.log('[Save] "' + name + '" loaded from IndexedDB');
                    toast('"' + name + '" chargee !');
                } else {
                    toast('"' + name + '" introuvable dans le navigateur. Utilisez Importer.', true);
                }
            }).catch(function(e) {
                console.error('[Save] Load error:', e);
                toast('Erreur chargement', true);
            });
        }

        function importFile(input) {
            if (!input.files || !input.files[0]) return;
            var file = input.files[0];
            var name = file.name.replace(/\.(state|sav|srm)$/i, '');
            var reader = new FileReader();
            reader.onload = function(e) {
                var data = new Uint8Array(e.target.result);
                // Load immediately
                try {
                    window.EJS_emulator.gameManager.loadState(data);
                    console.log('[Save] Imported "' + name + '" (' + data.length + 'B)');
                } catch(err) {
                    console.error('[Save] Import load error:', err);
                }
                // Store in IndexedDB
                dbPut('state_' + name, data).catch(function() {});
                // Update registry
                var reg = getRegistry();
                var found = false;
                var now = new Date();
                var dateStr = now.toLocaleDateString('fr-FR') + ' ' + now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
                for (var i = 0; i < reg.length; i++) {
                    if (reg[i].name === name) {
                        reg[i].date = dateStr;
                        reg[i].size = data.length;
                        found = true;
                        break;
                    }
                }
                if (!found) {
                    reg.push({ name: name, date: dateStr, size: data.length });
                }
                setRegistry(reg);
                _sessionActive = true;
                closeModals();
                toast('"' + name + '" importee et chargee !');
            };
            reader.readAsArrayBuffer(file);
            input.value = '';
        }

        // ============================================================
        // SRAM BACKUP (every 10s) + STATE AUTO-SAVE (every 60s)
        // ============================================================
        var _lastSramHash = '';

        function hashBytes(data) {
            // Simple fast hash to detect changes
            var h = 0;
            for (var i = 0; i < data.length; i += 64) {
                h = ((h << 5) - h + data[i]) | 0;
            }
            return h.toString();
        }

        function countNonEmpty(data) {
            var count = 0;
            for (var i = 0; i < data.length; i += 16) {
                if (data[i] !== 0 && data[i] !== 0xFF) count++;
            }
            return count;
        }

        function backupSRAM() {
            try {
                var gm = window.EJS_emulator.gameManager;
                gm.saveSaveFiles();
                var sav = gm.getSaveFile();
                if (!sav || sav.length === 0) return;
                var hash = hashBytes(sav);
                if (hash === _lastSramHash) return; // No change
                _lastSramHash = hash;
                var nonEmpty = countNonEmpty(sav);
                if (nonEmpty < 5) return; // Still blank save
                // Real save data detected - backup to localStorage
                var bin = '';
                for (var i = 0; i < sav.length; i++) bin += String.fromCharCode(sav[i]);
                localStorage.setItem('pokeemerald_sram', btoa(bin));
                console.log('[SRAM] Backup OK (' + sav.length + 'B, ' + nonEmpty + ' non-empty sectors)');
            } catch(e) {}
        }

        var _autoStarted = false;
        function startAutoSystems() {
            if (_autoStarted) return;
            _autoStarted = true;
            // SRAM backup every 10 seconds (lightweight - only writes if data changed)
            setInterval(backupSRAM, 10000);
            console.log('[SRAM] Backup polling active (every 10s)');
            // State auto-save every 60 seconds (heavier - full emulator state)
            setInterval(function() {
                if (!_sessionActive) return;
                try {
                    var state = window.EJS_emulator.gameManager.getState();
                    if (state && state.length > 0) {
                        dbPut('state___autosave', state).catch(function() {});
                        var reg = getRegistry();
                        var now = new Date();
                        var dateStr = now.toLocaleDateString('fr-FR') + ' ' + now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
                        var found = false;
                        for (var i = 0; i < reg.length; i++) {
                            if (reg[i].name === '__autosave') {
                                reg[i].date = dateStr; reg[i].size = state.length;
                                found = true; break;
                            }
                        }
                        if (!found) reg.push({ name: '__autosave', date: dateStr, size: state.length });
                        setRegistry(reg);
                    }
                } catch(e) {}
            }, 60000);
            console.log('[Save] State auto-save active (every 60s)');
        }

        // Wait for emulator ready
        var _waitReady = setInterval(function() {
            try {
                if (window.EJS_emulator && window.EJS_emulator.gameManager) {
                    clearInterval(_waitReady);
                    console.log('[Save] Emulator ready');
                    setTimeout(startAutoSystems, 5000);
                }
            } catch(e) {}
        }, 1000);

        // Emergency save on page close
        function emergencySave() {
            // Always backup SRAM (even if session not active)
            backupSRAM();
            if (!_sessionActive) return;
            try {
                var state = window.EJS_emulator.gameManager.getState();
                if (state && state.length > 0) {
                    dbPut('state___autosave', state).catch(function() {});
                    var reg = getRegistry();
                    var now = new Date();
                    var dateStr = now.toLocaleDateString('fr-FR') + ' ' + now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
                    var found = false;
                    for (var i = 0; i < reg.length; i++) {
                        if (reg[i].name === '__autosave') {
                            reg[i].date = dateStr; reg[i].size = state.length;
                            found = true; break;
                        }
                    }
                    if (!found) reg.push({ name: '__autosave', date: dateStr, size: state.length });
                    setRegistry(reg);
                }
            } catch(e) {}
        }
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'hidden') emergencySave();
        });
        window.addEventListener('pagehide', emergencySave);
        window.addEventListener('beforeunload', emergencySave);

        // ============================================================
        // NAME DIALOG
        // ============================================================
        var _nameCallback = null;
        function confirmName() {
            var val = document.getElementById('name-input').value.trim();
            document.getElementById('name-dialog').classList.remove('open');
            if (_nameCallback) _nameCallback(val || null);
            _nameCallback = null;
        }
        function cancelName() {
            document.getElementById('name-dialog').classList.remove('open');
            _nameCallback = null;
        }
        document.getElementById('name-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') confirmName();
            if (e.key === 'Escape') cancelName();
        });

        // ============================================================
        // UTILS
        // ============================================================
        function closeModals() {
            document.getElementById('save-modal').classList.remove('open');
            document.getElementById('load-modal').classList.remove('open');
            document.getElementById('name-dialog').classList.remove('open');
        }
        function escHtml(s) {
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }
        function formatSize(bytes) {
            if (bytes > 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
            if (bytes > 1024) return (bytes / 1024).toFixed(0) + ' KB';
            return bytes + ' B';
        }
        function toast(msg, isError) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = isError ? 'rgba(255, 50, 50, 0.9)' : 'rgba(0, 200, 83, 0.9)';
            t.classList.add('show');
            setTimeout(function() { t.classList.remove('show'); }, 2500);
        }

    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
